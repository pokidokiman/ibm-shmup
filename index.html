<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBM SHMUP - INSERT COIN</title>
<style>
@font-face {
  font-family: 'IBM';
  src: local('Courier New'), local('Lucida Console'), local('monospace');
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; font-family: 'IBM', monospace;
  overflow: hidden;
}

/* CRT overlay */
.crt::before {
  content: " ";
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.15) 0px,
    rgba(0,0,0,0.15) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
  z-index: 100;
}

/* CRT curvature via SVG filter */
.crt {
  position: relative;
  filter: url(#crt-curve);
}

#game-container {
  position: relative;
  width: 800px; height: 600px;
  background: #000;
  border: 4px solid #0a0;
  box-shadow: 0 0 40px rgba(0,255,0,0.2), inset 0 0 60px rgba(0,255,0,0.05);
  image-rendering: pixelated;
}

canvas {
  display: block;
  width: 800px; height: 600px;
  background: #000;
}

#ui-overlay {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 8px 16px;
  display: flex; justify-content: space-between;
  font-size: 14px; color: #0f0; text-shadow: 0 0 8px #0f0;
  pointer-events: none;
  z-index: 10;
}

#ui-overlay .right { text-align: right; }
#ui-overlay .left { text-align: left; }
#game-over, #title-screen {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  color: #0f0; text-shadow: 0 0 12px #0f0;
  z-index: 20; pointer-events: none;
}
#title-screen { pointer-events: auto; }
#title-screen h1 {
  font-size: 48px; letter-spacing: 12px;
  margin-bottom: 10px;
}
#title-screen .sub {
  font-size: 18px; opacity: 0.7; margin-bottom: 40px;
}
#title-screen .blink {
  font-size: 22px;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

#game-over {
  display: none;
}
#game-over .big { font-size: 36px; margin-bottom: 16px; letter-spacing: 6px; }
#game-over .score { font-size: 20px; margin-bottom: 20px; }
#game-over .small { font-size: 14px; opacity: 0.7; }

/* Scanline flicker */
body::after {
  content: " ";
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.3) 100%);
  pointer-events: none;
  z-index: 99;
}
</style>
</head>
<body class="crt">

<svg style="display:none;">
  <filter id="crt-curve">
    <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" />
  </filter>
</svg>

<div id="game-container">
  <canvas id="game" width="800" height="600"></canvas>
  <div id="ui-overlay">
    <div class="left">
      SCORE<br><span id="scoreDisplay">00000</span>
    </div>
    <div class="right">
      HI-SCORE<br><span id="hiScoreDisplay">00000</span>
    </div>
  </div>

  <div id="title-screen">
    <h1>SHMUP</h1>
    <div class="sub">┌────────────┐<br>│ IBM 5153 │<br>└────────────┘</div>
    <div class="blink">□ INSERT COIN □</div>
    <div style="margin-top:40px; font-size:14px; opacity:0.5;">
      ARROWS/ZQSD ─ MOVE &nbsp;│&nbsp; SPACE/Z ─ FIRE<br>
      P ─ PAUSE
    </div>
  </div>

  <div id="game-over">
    <div class="big">GAME OVER</div>
    <div class="score">SCORE: <span id="finalScore">0</span></div>
    <div class="small blink" style="margin-top:20px;">PRESS SPACE TO CONTINUE</div>
  </div>
</div>

<script>
// ─── AUDIO (Web Audio blips) ───
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playBlip(freq, duration, type = 'square', vol = 0.08) {
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

function sfxShoot() { playBlip(800, 0.08, 'square', 0.05); }
function sfxHit() { playBlip(200, 0.15, 'sawtooth', 0.08); }
function sfxExplode() {
  playBlip(100, 0.3, 'sawtooth', 0.1);
  playBlip(60, 0.4, 'square', 0.06);
}
function sfxPowerup() {
  playBlip(600, 0.1); setTimeout(() => playBlip(900, 0.15), 100);
}
function sfxGameOver() {
  playBlip(300, 0.2); setTimeout(() => playBlip(200, 0.2), 200);
  setTimeout(() => playBlip(100, 0.4), 400);
}

// ─── CANVAS ───
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

// UI elements
const scoreSpan = document.getElementById('scoreDisplay');
const hiScoreSpan = document.getElementById('hiScoreDisplay');
const titleScreen = document.getElementById('title-screen');
const gameOverScreen = document.getElementById('game-over');
const finalScoreSpan = document.getElementById('finalScore');

// ─── GAME STATE ───
const Glyphs = {
  player: [' ▲ ', '╱ ╲', '╲ ╱', ' │ '],
  playerFire: ['│'],
  enemy1: ['┌─┐', '│O│', '└─┘'],
  enemy2: ['┌┴┐', '├[┤', '└┬┘'],
  enemy3: [' /\\ ', '/OO\\', '│  │'],
  bullet: ['│'],
  powerup: [' ╔═╗ ', ' ║P║ ', ' ╚═╝ '],
  explosion: ['*','+','×'],
};

let gameState = 'title'; // title | playing | paused | gameover
let score = 0;
let hiScore = parseInt(localStorage.getItem('ibmShmupHiScore')) || 0;
let lives = 3;
let level = 1;
let wave = 0;
let frame = 0;
let keys = {};
let player, bullets, enemies, enemyBullets, powerups, particles;
let spawnTimer = 0;
let waveTimer = 0;
let comboCounter = 0;
let comboTimer = 0;

// ─── PLAYER ───
function createPlayer() {
  return {
    x: W/2, y: H - 80,
    w: 24, h: 24,
    speed: 4,
    fireRate: 8,
    fireTimer: 0,
    power: 1,
    invincible: 0,
  };
}

// ─── BULLETS ───
function createBullet(x, y, isEnemy = false, speed = 5) {
  return {
    x, y, w: 4, h: 10,
    speed: isEnemy ? speed : -speed,
    isEnemy,
    active: true,
  };
}

// ─── ENEMIES ───
const enemyTypes = [
  { glyph: Glyphs.enemy1, hp: 1, speed: 0.8, score: 100, shootRate: 120, w: 18, h: 18 },
  { glyph: Glyphs.enemy2, hp: 2, speed: 1.0, score: 200, shootRate: 90, w: 18, h: 18 },
  { glyph: Glyphs.enemy3, hp: 3, speed: 0.6, score: 300, shootRate: 150, w: 20, h: 18 },
];

function createEnemy(x, y, type, pattern) {
  return {
    x, y, type,
    hp: type.hp, maxHp: type.hp,
    glyph: type.glyph, w: type.w, h: type.h,
    speed: type.speed, score: type.score,
    shootRate: type.shootRate, shootTimer: Math.random() * type.shootRate,
    pattern: pattern || 'down',
    active: true,
    originX: x,
    timer: 0,
    moveDir: 1,
  };
}

// ─── POWERUPS ───
function createPowerup(x, y, type = 'power') {
  return { x, y, w: 30, h: 18, type, speed: 1.5, active: true };
}

// ─── PARTICLES ───
function createParticle(x, y, color = '#0f0', count = 8) {
  const p = [];
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i;
    p.push({
      x, y,
      vx: Math.cos(angle) * (1 + Math.random() * 2),
      vy: Math.sin(angle) * (1 + Math.random() * 2),
      life: 20 + Math.random() * 15,
      maxLife: 35,
      color,
      size: 2 + Math.random() * 4,
    });
  }
  return p;
}

// ─── INIT / RESET ───
function resetGame() {
  score = 0;
  lives = 3;
  level = 1;
  wave = 0;
  frame = 0;
  comboCounter = 0;
  comboTimer = 0;
  player = createPlayer();
  bullets = [];
  enemies = [];
  enemyBullets = [];
  powerups = [];
  particles = [];
  spawnTimer = 0;
  waveTimer = 60;
  updateUI();
}

function startGame() {
  resetGame();
  gameState = 'playing';
  titleScreen.style.display = 'none';
  gameOverScreen.style.display = 'none';
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// ─── SPAWNING ───
function spawnWave() {
  wave++;
  const cols = 7;
  const rows = Math.min(2 + Math.floor(wave / 2), 5);
  const spacingX = 80;
  const spacingY = 60;
  const startX = (W - (cols - 1) * spacingX) / 2;
  const startY = 40;

  // Pick enemy type based on wave
  const typeIdx = Math.min(Math.floor(wave / 2), enemyTypes.length - 1);
  const eType = enemyTypes[typeIdx];

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      // Random missing enemies for variety
      if (Math.random() < 0.1) continue;
      const ex = startX + c * spacingX;
      const ey = startY + r * spacingY;

      // Variation: mix in some weaker enemies
      const actualType = r < 2 && wave > 2
        ? enemyTypes[Math.min(typeIdx + 1, enemyTypes.length - 1)]
        : enemyTypes[Math.max(typeIdx - 1, 0)];

      enemies.push(createEnemy(ex, ey, actualType, 'wave'));
    }
  }
}

function spawnPowerup(x, y) {
  if (Math.random() < 0.12) {
    const types = ['power'];
    powerups.push(createPowerup(x, y, types[Math.floor(Math.random() * types.length)]));
  }
}

// ─── PLAYER FIRE ───
function playerFire() {
  sfxShoot();
  const pw = player.power;
  if (pw >= 1) bullets.push(createBullet(player.x, player.y - 12));
  if (pw >= 2) {
    bullets.push(createBullet(player.x - 8, player.y - 6));
    bullets.push(createBullet(player.x + 8, player.y - 6));
  }
  if (pw >= 3) {
    bullets[bullets.length - 3].vx = -0.5;
    bullets[bullets.length - 2].vx = 0.5;
  }
  player.fireTimer = player.fireRate - player.power;
}

// ─── UPDATE ───
function update() {
  if (gameState !== 'playing') return;
  frame++;

  // Player movement
  if (keys['ArrowLeft'] || keys['KeyA'] || keys['KeyQ']) player.x -= player.speed;
  if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;
  if (keys['ArrowUp'] || keys['KeyZ'] || keys['KeyW']) player.y -= player.speed;
  if (keys['ArrowDown'] || keys['KeyS']) player.y += player.speed;
  player.x = Math.max(20, Math.min(W - 20, player.x));
  player.y = Math.max(20, Math.min(H - 20, player.y));

  // Fire
  if (player.fireTimer > 0) player.fireTimer--;
  if ((keys['Space'] || keys['KeyZ']) && player.fireTimer <= 0) {
    playerFire();
  }

  // Invincibility
  if (player.invincible > 0) player.invincible--;

  // Combo timer
  if (comboTimer > 0) comboTimer--;
  else comboCounter = 0;

  // Spawn enemies
  waveTimer--;
  if (waveTimer <= 0 && enemies.length === 0) {
    spawnWave();
    waveTimer = 120 + wave * 20;
    level++;
    // Speed up enemies as levels progress
    enemies.forEach(e => e.speed += 0.05 * wave);
  }

  // Update bullets
  for (const b of bullets) {
    b.y += b.speed;
    if (b.vx) b.x += b.vx;
    if (b.y < -20 || b.y > H + 20) b.active = false;
  }
  bullets = bullets.filter(b => b.active);

  // Update enemy bullets
  for (const b of enemyBullets) {
    b.y += b.speed;
    if (b.y > H + 20) b.active = false;
  }
  enemyBullets = enemyBullets.filter(b => b.active);

  // Update enemies
  for (const e of enemies) {
    e.timer++;

    // Movement patterns
    if (e.pattern === 'wave') {
      e.x = e.originX + Math.sin(e.timer * 0.02 + e.y * 0.01) * 30;
      e.y += e.speed * 0.3;
    } else {
      e.y += e.speed;
    }

    // Shooting
    e.shootTimer--;
    if (e.shootTimer <= 0 && e.y > 20 && e.y < H * 0.6) {
      enemyBullets.push(createBullet(e.x, e.y + 10, true, 1.5 + Math.random()));
      e.shootTimer = e.shootRate - wave * 2;
      if (e.shootTimer < 40) e.shootTimer = 40;
    }

    // Off screen
    if (e.y > H + 30) e.active = false;
  }

  // Update powerups
  for (const p of powerups) {
    p.y += p.speed;
    if (p.y > H + 20) p.active = false;
  }
  powerups = powerups.filter(p => p.active);

  // ─── COLLISIONS ───

  // Bullets vs enemies
  for (const b of bullets) {
    if (!b.active) continue;
    for (const e of enemies) {
      if (!e.active) continue;
      if (Math.abs(b.x - e.x) < e.w/2 + 4 && Math.abs(b.y - e.y) < e.h/2 + 4) {
        b.active = false;
        e.hp--;
        if (e.hp <= 0) {
          e.active = false;
          const pts = e.score * (1 + comboCounter * 0.1);
          score += Math.floor(pts);
          comboCounter++;
          comboTimer = 120;
          particles.push(...createParticle(e.x, e.y, '#0f0', 12));
          particles.push(...createParticle(e.x, e.y, '#ff0', 6));
          sfxExplode();
          spawnPowerup(e.x, e.y);
        } else {
          sfxHit();
          particles.push(...createParticle(e.x, e.y, '#0f0', 4));
        }
        updateUI();
        break;
      }
    }
  }

  // Enemy bullets vs player
  if (player.invincible <= 0) {
    for (const b of enemyBullets) {
      if (!b.active) continue;
      if (Math.abs(b.x - player.x) < 14 && Math.abs(b.y - player.y) < 14) {
        b.active = false;
        hitPlayer();
        break;
      }
    }

    // Enemies vs player
    for (const e of enemies) {
      if (!e.active) continue;
      if (Math.abs(e.x - player.x) < e.w/2 + 10 && Math.abs(e.y - player.y) < e.h/2 + 10) {
        e.active = false;
        particles.push(...createParticle(e.x, e.y, '#f00', 16));
        sfxExplode();
        hitPlayer();
        break;
      }
    }
  }

  // Powerups vs player
  for (const p of powerups) {
    if (!p.active) continue;
    if (Math.abs(p.x - player.x) < 24 && Math.abs(p.y - player.y) < 24) {
      p.active = false;
      if (p.type === 'power' && player.power < 4) player.power++;
      sfxPowerup();
    }
  }
  powerups = powerups.filter(p => p.active);

  // Update particles
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
  }
  particles = particles.filter(p => p.life > 0);

  // Remove dead enemies
  enemies = enemies.filter(e => e.active);

  // Update UI
  updateUI();
}

function hitPlayer() {
  lives--;
  player.invincible = 120;
  player.power = Math.max(1, player.power - 1);
  particles.push(...createParticle(player.x, player.y, '#f00', 20));
  sfxGameOver();

  if (lives <= 0) {
    gameOver();
  }
}

function gameOver() {
  gameState = 'gameover';
  if (score > hiScore) {
    hiScore = score;
    localStorage.setItem('ibmShmupHiScore', hiScore);
  }
  finalScoreSpan.textContent = score;
  gameOverScreen.style.display = 'flex';
  updateUI();
}

function updateUI() {
  scoreSpan.textContent = String(score).padStart(5, '0');
  hiScoreSpan.textContent = String(hiScore).padStart(5, '0');
}

// ─── DRAWING ───
function drawText(x, y, lines, color = '#0f0') {
  ctx.font = '14px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = color;
  lines.forEach((line, i) => {
    ctx.fillText(line, x, y + i * 28);
  });
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // ─── GRID (subtle phosphor) ───
  ctx.strokeStyle = 'rgba(0,255,0,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  if (gameState === 'playing' || gameState === 'paused' || gameState === 'gameover') {
    // Draw player
    if (gameState !== 'gameover' && player.invincible % 6 < 3) {
      const pg = Glyphs.player;
      ctx.fillStyle = '#0f0';
      drawText(player.x, player.y - 14, [pg[0], pg[1], pg[2], pg[3]]);
    }

    // Draw bullets
    ctx.fillStyle = '#0f0';
    for (const b of bullets) {
      ctx.fillRect(b.x - 1, b.y - 5, 3, 10);
    }

    // Draw enemy bullets
    ctx.fillStyle = '#ff0';
    for (const b of enemyBullets) {
      ctx.fillRect(b.x - 2, b.y - 2, 4, 4);
      ctx.fillStyle = '#0f0';
    }

    // Draw enemies
    for (const e of enemies) {
      const lines = e.glyph;
      // Flash when hit
      const color = e.hp < e.maxHp && frame % 4 < 2 ? '#ff0' : '#0f0';
      drawText(e.x, e.y - (lines.length/2) * 14, lines, color);

      // HP bar for tough enemies
      if (e.maxHp > 1) {
        ctx.fillStyle = '#0a0';
        ctx.fillRect(e.x - 10, e.y - 16, 20, 3);
        ctx.fillStyle = '#0f0';
        ctx.fillRect(e.x - 10, e.y - 16, 20 * (e.hp / e.maxHp), 3);
      }
    }

    // Draw powerups
    for (const p of powerups) {
      const lines = Glyphs.powerup;
      ctx.fillStyle = '#0ff';
      drawText(p.x, p.y, lines, '#0ff');
    }

    // Draw particles
    for (const p of particles) {
      const alpha = p.life / p.maxLife;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      // ASCII-like particle shapes
      const chars = ['*', '+', '.', '°'];
      ctx.font = '12px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(chars[Math.floor(Math.random() * chars.length)], p.x, p.y);
    }
    ctx.globalAlpha = 1;

    // Lives indicator
    ctx.fillStyle = '#0f0';
    ctx.font = '14px monospace';
    ctx.textAlign = 'left';
    let livesStr = '';
    for (let i = 0; i < lives; i++) livesStr += '▲ ';
    ctx.fillText(livesStr, 16, H - 16);

    // Power level
    ctx.textAlign = 'right';
    ctx.fillText('PWR:' + player.power, W - 16, H - 16);

    // Level / Wave
    ctx.textAlign = 'center';
    ctx.font = '12px monospace';
    ctx.fillStyle = 'rgba(0,255,0,0.4)';
    ctx.fillText('WAVE ' + wave, W/2, H - 16);

    // Combo
    if (comboCounter > 1) {
      ctx.fillStyle = '#ff0';
      ctx.textAlign = 'center';
      ctx.font = '16px monospace';
      ctx.fillText('×' + comboCounter, W/2, 30);
    }

    // Pause indicator
    if (gameState === 'paused') {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#0f0';
      ctx.font = '24px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', W/2, H/2);
      ctx.font = '14px monospace';
      ctx.fillText('PRESS P TO CONTINUE', W/2, H/2 + 30);
    }
  }

  // Phosphor glow effect
  ctx.fillStyle = 'rgba(0,255,0,0.015)';
  ctx.fillRect(0, 0, W, H);
}

// ─── GAME LOOP ───
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// ─── KEYBOARD ───
document.addEventListener('keydown', (e) => {
  keys[e.code] = true;

  if (e.code === 'KeyP' && gameState === 'playing') {
    gameState = 'paused';
  } else if (e.code === 'KeyP' && gameState === 'paused') {
    gameState = 'playing';
  }

  if (gameState === 'title' && (e.code === 'Space' || e.code === 'Enter')) {
    startGame();
  }

  if (gameState === 'gameover' && (e.code === 'Space' || e.code === 'Enter')) {
    startGame();
  }

  // Prevent scrolling
  if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
    e.preventDefault();
  }
});

document.addEventListener('keyup', (e) => {
  keys[e.code] = false;
});

// ─── START ───
hiScoreSpan.textContent = String(hiScore).padStart(5, '0');
gameLoop();
</script>
</body>
</html>
