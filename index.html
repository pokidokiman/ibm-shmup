<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBM SHMUP - CRT TEST</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; font-family: 'Courier New', monospace;
  overflow: hidden;
}
#game-container {
  position: relative;
  width: 800px; height: 600px;
  overflow: hidden;
}
#game-canvas {
  display: block;
  width: 800px; height: 600px;
  background: #000;
  image-rendering: pixelated;
}
#three-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 800px; height: 600px;
  pointer-events: none;
  z-index: 2;
}
</style>
</head>
<body>
<div id="game-container">
  <canvas id="game-canvas" width="640" height="480"></canvas>
  <div id="boot-text" style="position:absolute;top:0;left:0;width:100%;height:100%;color:#0f0;padding:40px;font-size:14px;font-family:'Courier New',monospace;z-index:1;pointer-events:none;text-shadow:0 0 8px #0f0;"></div>
</div>
<script>
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const W = 640, H = 480;

// ─── Boot text (HTML + Canvas) ───
const bootTextEl = document.getElementById('boot-text');
let bootText = '';
let bootDone = false;

const bootLines = [
  { t: '', d: 200 },
  { t: 'IBM 5153 BIOS v1.11 01/10/84', d: 300 },
  { t: 'Copyright 1984 IBM Corp.', d: 200 },
  { t: '', d: 150 },
  { t: '  CPU: Intel 8088 @ 4.77 MHz', d: 150 },
  { t: '  Coprocessor: None', d: 100 },
  { t: '', d: 100 },
  { t: 'Memory Test:     ', d: 80, mem: true },
  { t: '', d: 150 },
  { t: '  IBM SHMUP v1.0 detected', d: 400 },
  { t: '', d: 100 },
  { t: '  2 Floppy drive(s) detected', d: 300 },
  { t: '', d: 150 },
  { t: '  Starting MS-DOS...', d: 600 },
  { t: '', d: 200 },
];

function runBoot() {
  let li = 0, ci = 0, mem = 0, bt = '';
  bootDone = false;

  function next() {
    if (li >= bootLines.length) {
      bt += '\n$ INSERT COIN';
      bootTextEl.textContent = bt;
      bootDone = true;
      return;
    }
    const line = bootLines[li];
    if (line.mem) {
      mem = 0;
      let ml = '';
      function memTick() {
        mem += Math.floor(8 + Math.random() * 24);
        if (mem >= 640) {
          mem = 640;
          bt += line.t + '0640 KB OK\n';
          bootTextEl.textContent = bt + '█';
          li++;
          setTimeout(next, 200);
          return;
        }
        ml = line.t + String(mem).padStart(4, ' ') + ' KB';
        const a = bt.split('\n');
        if (a.length > 0 && a[a.length-1].startsWith(line.t.trim())) a[a.length-1] = ml;
        else a.push(ml);
        bt = a.join('\n');
        bootTextEl.textContent = bt + '█';
        setTimeout(memTick, 30);
      }
      memTick();
      return;
    }
    if (ci < line.t.length) {
      bt += line.t[ci];
      ci++;
      bootTextEl.textContent = bt + '█';
      setTimeout(next, 20 + Math.random() * 20);
    } else {
      bt += '\n';
      ci = 0;
      li++;
      bootTextEl.textContent = bt + '█';
      setTimeout(next, line.d);
    }
  }
  bt = '';
  bootTextEl.textContent = '█';
  setTimeout(next, 100);
}

// Draw boot screen to canvas (for Three.js)
function drawToCanvas() {
  ctx.fillStyle = '#020a02';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#33ff33';
  ctx.shadowBlur = 6;
  ctx.shadowColor = '#33ff33';
  ctx.font = '12px "Courier New", monospace';

  const lines = (bootTextEl.textContent || '').split('\n');
  lines.forEach((l, i) => {
    ctx.fillText(l.replace('█', '_'), 20, 30 + i * 18);
  });
}

// ─── Three.js ───
const container = document.getElementById('game-container');
const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(800, 600);
renderer.domElement.id = 'three-canvas';
container.appendChild(renderer.domElement);

const texture = new THREE.CanvasTexture(canvas);
texture.minFilter = THREE.LinearFilter;

const uniforms = {
  tDiffuse: { value: texture },
  uTime: { value: 0 }
};

const material = new THREE.ShaderMaterial({
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uTime;
    varying vec2 vUv;

    vec2 curve(vec2 uv) {
      uv = (uv - 0.5) * 2.0;
      uv.x *= 1.0 + pow(abs(uv.y) / 5.0, 2.0);
      uv.y *= 1.0 + pow(abs(uv.x) / 4.0, 2.0);
      uv = uv / 2.0 + 0.5;
      uv = uv * 0.96 + 0.02;
      return uv;
    }

    void main() {
      vec2 uv = curve(vUv);
      if (uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0) {
        gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
        return;
      }
      float r = texture2D(tDiffuse, uv + vec2(0.001, 0.0)).r;
      float g = texture2D(tDiffuse, uv).g;
      float b = texture2D(tDiffuse, uv - vec2(0.001, 0.0)).b;
      vec3 col = vec3(r, g, b);
      // Subtiele scanlines — alleen donkerder, geen groene verschuiving
      col *= 0.92 + 0.08 * sin(uv.y * 800.0);
      col *= 1.0 + 0.005 * sin(uTime * 20.0);
      float v = uv.x * uv.y * (1.0 - uv.x) * (1.0 - uv.y);
      col *= clamp(pow(16.0 * v, 0.5), 0.0, 1.0);
      gl_FragColor = vec4(col, 1.0);
    }
  `,
  uniforms
});

const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
scene.add(mesh);

function animate() {
  uniforms.uTime.value = performance.now() / 1000.0;
  drawToCanvas();
  texture.needsUpdate = true;
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

runBoot();
animate();
</script>
</body>
</html>
