<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBM SHMUP - INSERT COIN</title>
<style>
@font-face {
  font-family: 'IBM';
  src: local('Courier New'), local('Lucida Console'), local('monospace');
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; font-family: 'IBM', monospace;
  overflow: hidden;
}

/* CRT overlay — barrel distortion + scanlines + vignette */
.crt::before {
  content: " ";
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.12) 0px,
    rgba(0,0,0,0.12) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
  z-index: 100;
}

#crt-bezel #game-container {
  /* Beeld blijft vlak, curvature gebeurt via crt-overlay canvas */
}

/* CRT vignette — donkere hoeken, glow in centrum */
#crt-bezel::after {
  content: " ";
  position: absolute; top: -10px; left: -10px;
  width: calc(100% + 20px); height: calc(100% + 20px);
  background: radial-gradient(
    ellipse at center,
    transparent 55%,
    rgba(0,0,0,0.15) 75%,
    rgba(0,0,0,0.35) 100%
  );
  pointer-events: none;
  z-index: 5;
  border-radius: 12px;
}

.crt {
  position: relative;
}

#crt-bezel {
  position: relative;
  perspective: 800px;
  width: 824px; height: 624px; /* 800+24 padding for outline */
  background: #000;
  outline: 4px solid #0a0;
  outline-offset: 2px;
  box-shadow: 0 0 40px rgba(0,255,0,0.2), 0 0 60px rgba(0,255,0,0.08);
  image-rendering: pixelated;
  margin: 10px;
  display: flex;
  justify-content: center;
  align-items: center;
}

#game-container {
  position: relative;
  width: 800px; height: 600px;
}

canvas {
  display: block;
  width: 800px; height: 600px;
  background: #000;
}

#ui-overlay {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 8px 16px;
  display: flex; justify-content: space-between;
  font-size: 14px; color: #0f0; text-shadow: 0 0 8px #0f0;
  pointer-events: none;
  z-index: 10;
}

#ui-overlay .right { text-align: right; }
#ui-overlay .left { text-align: left; }
#game-over, #title-screen {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  color: #0f0; text-shadow: 0 0 12px #0f0;
  z-index: 20; pointer-events: none;
}
#title-screen { pointer-events: auto; }
#title-screen h1 {
  font-size: 48px; letter-spacing: 12px;
  margin-bottom: 10px;
}
#title-screen .sub {
  font-size: 18px; opacity: 0.7; margin-bottom: 40px;
}
#title-screen .sub .box {
  font-family: 'Courier New', 'IBM 3270', 'Lucida Console', monospace;
  font-size: 16px;
  letter-spacing: 1px;
  line-height: 1;
  display: inline-block;
  padding: 10px 30px;
  border: 2px solid #0f0;
  box-shadow: 0 0 8px rgba(0,255,0,0.15);
  color: #0f0;
  text-shadow: 0 0 6px #0f0;
}
#title-screen .blink {
  font-size: 22px;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

#game-over {
  display: none;
}
#game-over .big { font-size: 36px; margin-bottom: 16px; letter-spacing: 6px; }
#game-over .score { font-size: 20px; margin-bottom: 20px; }
#game-over .small { font-size: 14px; opacity: 0.7; }

/* Boot screen */
#boot-screen {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: none;
  flex-direction: column;
  justify-content: flex-start; align-items: flex-start;
  color: #0f0; text-shadow: 0 0 8px #0f0;
  z-index: 25;
  background: #000;
  padding: 40px 60px;
  font-family: 'Courier New', monospace;
}
#boot-text {
  font-size: 14px;
  line-height: 1.5;
  white-space: pre-wrap;
  overflow-wrap: break-word;
  word-break: break-all;
  text-align: left;
  max-width: 100%;
  padding: 20px;
}
#boot-cursor {
  display: inline-block;
  width: 8px;
  height: 14px;
  background: #0f0;
  animation: blink 0.5s step-end infinite;
  margin-left: 2px;
  vertical-align: text-bottom;
}

/* Scanline flicker */
body::after {
  content: " ";
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.3) 100%);
  pointer-events: none;
  z-index: 99;
}
</style>
</head>
<body class="crt">

<!-- CRT bezel + curvature -->
<div id="crt-bezel">
<div id="game-container">
  <canvas id="game" width="800" height="600"></canvas>
  <canvas id="crt-overlay" width="800" height="600" style="position:absolute;top:0;left:0;width:800px;height:600px;pointer-events:none;z-index:50;"></canvas>
  <div id="ui-overlay">
    <div class="left">
      SCORE<br><span id="scoreDisplay">00000</span>
    </div>
    <div class="right">
      HI-SCORE<br><span id="hiScoreDisplay">00000</span>
    </div>
  </div>

  <div id="boot-screen">
    <div id="boot-text"></div>
  </div>

  <div id="title-screen">
    <canvas id="matrix-canvas" width="800" height="600" style="position:absolute;top:0;left:0;z-index:1;pointer-events:none;background:transparent;"></canvas>
    <div style="position:relative;z-index:2;display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;">
      <h1>SHMUP</h1>
      <div class="sub"><div class="box">IBM 5153</div></div>
      <div class="blink">□ INSERT COIN □</div>
      <div style="margin-top:40px; font-size:14px; opacity:0.5;">
        ARROWS/ZQSD ─ MOVE &nbsp;│&nbsp; SPACE/Z ─ FIRE<br>
        P ─ PAUSE
      </div>
    </div>
  </div>

  <div id="game-over">
    <div class="big">GAME OVER</div>
    <div class="score">SCORE: <span id="finalScore">0</span></div>
    <div class="small blink" style="margin-top:20px;">PRESS SPACE TO CONTINUE</div>
  </div>
</div>

<script>
// ─── AUDIO (Web Audio blips) ───
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playBlip(freq, duration, type = 'square', vol = 0.08) {
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

function sfxShoot() { playBlip(800, 0.08, 'square', 0.05); }
function sfxHit() { playBlip(200, 0.15, 'sawtooth', 0.08); }
function sfxExplode() {
  playBlip(100, 0.3, 'sawtooth', 0.1);
  playBlip(60, 0.4, 'square', 0.06);
}
function sfxPowerup() {
  playBlip(600, 0.1); setTimeout(() => playBlip(900, 0.15), 100);
}
function sfxGameOver() {
  playBlip(300, 0.2); setTimeout(() => playBlip(200, 0.2), 200);
  setTimeout(() => playBlip(100, 0.4), 400);
}

// ─── FLOPPY DRIVE SEEK SOUND ───
function sfxFloppySeek() {
  try {
    const duration = 0.8;
    const sr = audioCtx.sampleRate;

    // Create buffer of filtered noise
    const bufSize = Math.floor(sr * duration);
    const buffer = audioCtx.createBuffer(1, bufSize, sr);
    const data = buffer.getChannelData(0);

    // Generate band-limited noise with mechanical character
    for (let i = 0; i < bufSize; i++) {
      const t = i / sr;
      // Low-frequency rumble (head moving)
      const rumble = (Math.random() * 2 - 1) * 0.3;
      // High-frequency scraping (head stepping on tracks)
      const scrape = (Math.random() * 2 - 1) * 0.5;
      // Click train - regular clicks as head steps across tracks
      const clickRate = 60 + Math.sin(t * 8) * 20; // varying step rate
      const clickPhase = (t * clickRate) % 1;
      const click = clickPhase < 0.05 ? 0.7 : 0;
      // Filter: low-pass via simple smoothing
      data[i] = rumble * 0.3 + scrape * 0.5 + click * 0.8;
    }
    // Simple low-pass filter (moving average)
    for (let i = 1; i < bufSize; i++) {
      data[i] = data[i] * 0.4 + data[i-1] * 0.6;
    }

    const source = audioCtx.createBufferSource();
    source.buffer = buffer;

    // Bandpass filter to shape the sound mechanically
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 800;
    filter.Q.value = 0.8;

    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

    source.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    source.start();
    source.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

// ─── CANVAS ───
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

// UI elements
const scoreSpan = document.getElementById('scoreDisplay');
const hiScoreSpan = document.getElementById('hiScoreDisplay');
const titleScreen = document.getElementById('title-screen');
const gameOverScreen = document.getElementById('game-over');
const finalScoreSpan = document.getElementById('finalScore');

// ─── GAME STATE ───
const Glyphs = {
  player: [' ▲ ', '╱ ╲', '╲ ╱', ' │ '],
  playerFire: ['│'],
  enemy1: ['┌─┐', '│O│', '└─┘'],
  enemy2: ['┌┴┐', '├[┤', '└┬┘'],
  enemy3: [' /\\ ', '/OO\\', '│  │'],
  bullet: ['│'],
  powerup: [' ╔═╗ ', ' ║P║ ', ' ╚═╝ '],
  explosion: ['*','+','×'],
};

let gameState = 'title'; // title | playing | paused | gameover
let score = 0;
let hiScore = parseInt(localStorage.getItem('ibmShmupHiScore')) || 0;
let lives = 3;
let level = 1;
let wave = 0;
let frame = 0;
let keys = {};
let player, bullets, enemies, enemyBullets, powerups, particles;
let spawnTimer = 0;
let waveTimer = 0;
let comboCounter = 0;
let comboTimer = 0;

// ─── BOOT SEQUENCE ───
const bootScreen = document.getElementById('boot-screen');
const bootTextEl = document.getElementById('boot-text');
let bootRunning = false;
let bootSequenceCompleted = false;

function runBootSequence() {
  bootRunning = true;
  bootScreen.style.display = 'flex';
  titleScreen.style.display = 'none';
  gameOverScreen.style.display = 'none';

  const lines = [
    { text: '', delay: 300 },
    { text: 'IBM 5153 BIOS v1.11 01/10/84', delay: 400 },
    { text: 'Copyright 1984 IBM Corp.', delay: 300 },
    { text: '', delay: 200 },
    { text: '  CPU: Intel 8088 @ 4.77 MHz', delay: 200 },
    { text: '  Coprocessor: None', delay: 150 },
    { text: '', delay: 150 },
    { text: 'Memory Test:     ', delay: 100, isMemTest: true },
    { text: '', delay: 200 },
    { text: '  IBM SHMUP v1.0 detected', delay: 500 },
    { text: '', delay: 150 },
    { text: '  2 Floppy drive(s) detected', delay: 400 },
    { text: '', delay: 200 },
    { text: '  Starting MS-DOS...', delay: 800 },
    { text: '', delay: 400 },
  ];

  let lineIdx = 0;
  let charIdx = 0;
  let memCount = 0;
  let memInterval = null;
  let bootText = '';
  let currentLine = '';

  function typeNextChar() {
    if (lineIdx >= lines.length) {
      // Boot sequence done, transition to title
      setTimeout(() => {
        bootScreen.style.display = 'none';
        bootRunning = false;
        bootSequenceCompleted = true;
        titleScreen.style.display = 'flex';
        startMatrixRain();
        if (audioCtx.state === 'suspended') audioCtx.resume();
      }, 600);
      return;
    }

    const line = lines[lineIdx];

    if (line.isMemTest) {
      // Memory test animation
      currentLine = line.text;
      memCount = 0;
      if (memInterval) clearInterval(memInterval);
      memInterval = setInterval(() => {
        memCount += Math.floor(8 + Math.random() * 24);
        if (memCount >= 640) {
          memCount = 640;
          clearInterval(memInterval);
          memInterval = null;
          bootText += currentLine + '0640 KB OK\n';
          bootTextEl.textContent = bootText + '█';
          // Play a little beep for POST completion
          try { playBlip(1000, 0.05, 'square', 0.04); } catch(e) {}
          lineIdx++;
          setTimeout(typeNextChar, 300);
          return;
        }
        // Memory test — replace last line instead of appending
        const memLine = currentLine + String(memCount).padStart(4, ' ') + ' KB';
        const linesArr = bootText.split('\n');
        if (linesArr.length > 0 && linesArr[linesArr.length-1].startsWith(currentLine.trim())) {
          linesArr[linesArr.length-1] = memLine;
        } else {
          linesArr.push(memLine);
        }
        bootText = linesArr.join('\n');
        bootTextEl.textContent = bootText + '█';
      }, 40);
      return;
    }

    // Regular line: type it out character by character
    if (charIdx < line.text.length) {
      bootText += line.text[charIdx];
      charIdx++;
      bootTextEl.textContent = bootText + '█';
      const delay = line.text[charIdx - 1] === ' ' ? 20 : 25 + Math.random() * 30;
      setTimeout(typeNextChar, delay);
    } else {
      bootText += '\n';
      charIdx = 0;
      lineIdx++;
      bootTextEl.textContent = bootText + '█';
      setTimeout(typeNextChar, line.delay);
    }
  }

  bootText = '';
  bootTextEl.textContent = '█';
  setTimeout(typeNextChar, 200);
}

// ─── MATRIX RAIN ON TITLE ───
const matrixCanvas = document.getElementById('matrix-canvas');
const matrixCtx = matrixCanvas.getContext('2d');
let matrixDrops = [];
let matrixAnimId = null;

const matrixChars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';

function startMatrixRain() {
  const cols = Math.floor(800 / 14);
  matrixDrops = [];
  for (let i = 0; i < cols; i++) {
    matrixDrops[i] = Math.floor(Math.random() * -100);
  }
  if (matrixAnimId) cancelAnimationFrame(matrixAnimId);
  drawMatrixRain();
}

function drawMatrixRain() {
  matrixCtx.fillStyle = 'rgba(0, 0, 0, 0.08)';
  matrixCtx.fillRect(0, 0, 800, 600);
  matrixCtx.font = '12px monospace';
  matrixCtx.textAlign = 'center';

  for (let i = 0; i < matrixDrops.length; i++) {
    const x = i * 14 + 7;
    const y = matrixDrops[i] * 14;
    // Leading character brighter
    const char = matrixChars[Math.floor(Math.random() * matrixChars.length)];
    matrixCtx.fillStyle = 'rgba(0,255,0,0.06)';
    matrixCtx.fillText(char, x, y);
    // Bright head
    matrixCtx.fillStyle = 'rgba(0,255,0,0.3)';
    matrixCtx.fillText(char, x, y - 14);
    matrixDrops[i] += 0.5;
    if (matrixDrops[i] * 14 > 600 && Math.random() > 0.975) {
      matrixDrops[i] = 0;
    }
  }
  matrixAnimId = requestAnimationFrame(drawMatrixRain);
}

function stopMatrixRain() {
  if (matrixAnimId) {
    cancelAnimationFrame(matrixAnimId);
    matrixAnimId = null;
  }
  matrixCtx.clearRect(0, 0, 800, 600);
}

// ─── CRTC 6845 RASTER EFFECTS ───
let screenShake = { x: 0, y: 0, intensity: 0 };
let rasterTear = { active: false, offset: 0, timer: 0 };
let syncJitter = 0;

function triggerScreenShake(intensity) {
  screenShake.intensity = Math.max(screenShake.intensity, intensity);
}

function triggerRasterTear() {
  rasterTear.active = true;
  rasterTear.offset = Math.floor(Math.random() * 200) - 100;
  rasterTear.timer = 20;
}

function updateRasterEffects() {
  // Screen shake decay
  if (screenShake.intensity > 0) {
    screenShake.x = (Math.random() - 0.5) * screenShake.intensity * 6;
    screenShake.y = (Math.random() - 0.5) * screenShake.intensity * 4;
    screenShake.intensity *= 0.85;
    if (screenShake.intensity < 0.3) {
      screenShake.intensity = 0;
      screenShake.x = 0;
      screenShake.y = 0;
    }
  }

  // Raster tear decay
  if (rasterTear.active) {
    rasterTear.timer--;
    if (rasterTear.timer <= 0) {
      rasterTear.active = false;
      rasterTear.offset = 0;
    }
  }

  // Subtle sync jitter
  syncJitter = (Math.random() - 0.5) * 0.6;
}

// ─── PLAYER ───
function createPlayer() {
  return {
    x: W/2, y: H - 80,
    w: 24, h: 24,
    speed: 4,
    fireRate: 8,
    fireTimer: 0,
    power: 1,
    invincible: 0,
  };
}

// ─── BULLETS ───
function createBullet(x, y, isEnemy = false, speed = 5) {
  return {
    x, y, w: 4, h: 10,
    speed: isEnemy ? speed : -speed,
    isEnemy,
    active: true,
  };
}

// ─── ENEMIES ───
const enemyTypes = [
  { glyph: Glyphs.enemy1, hp: 1, speed: 0.8, score: 100, shootRate: 120, w: 18, h: 18 },
  { glyph: Glyphs.enemy2, hp: 2, speed: 1.0, score: 200, shootRate: 90, w: 18, h: 18 },
  { glyph: Glyphs.enemy3, hp: 3, speed: 0.6, score: 300, shootRate: 150, w: 20, h: 18 },
];

function createEnemy(x, y, type, pattern) {
  return {
    x, y, type,
    hp: type.hp, maxHp: type.hp,
    glyph: type.glyph, w: type.w, h: type.h,
    speed: type.speed, score: type.score,
    shootRate: type.shootRate, shootTimer: Math.random() * type.shootRate,
    pattern: pattern || 'down',
    active: true,
    originX: x,
    timer: 0,
    moveDir: 1,
  };
}

// ─── POWERUPS ───
function createPowerup(x, y, type = 'power') {
  return { x, y, w: 30, h: 18, type, speed: 1.5, active: true };
}

// ─── PARTICLES ───
function createParticle(x, y, color = '#0f0', count = 8) {
  const p = [];
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i;
    p.push({
      x, y,
      vx: Math.cos(angle) * (1 + Math.random() * 2),
      vy: Math.sin(angle) * (1 + Math.random() * 2),
      life: 20 + Math.random() * 15,
      maxLife: 35,
      color,
      size: 2 + Math.random() * 4,
    });
  }
  return p;
}

// ─── INIT / RESET ───
function resetGame() {
  score = 0;
  lives = 3;
  level = 1;
  wave = 0;
  frame = 0;
  comboCounter = 0;
  comboTimer = 0;
  player = createPlayer();
  bullets = [];
  enemies = [];
  enemyBullets = [];
  powerups = [];
  particles = [];
  spawnTimer = 0;
  waveTimer = 60;
  updateUI();
}

function startGame() {
  if (bootRunning) return;
  if (!bootSequenceCompleted) {
    runBootSequence();
    bootSequenceCompleted = true;
    return;
  }
  resetGame();
  gameState = 'playing';
  titleScreen.style.display = 'none';
  gameOverScreen.style.display = 'none';
  stopMatrixRain();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// ─── SPAWNING ───
function spawnWave() {
  wave++;
  // Play floppy drive seek sound on new wave
  sfxFloppySeek();
  const cols = 7;
  const rows = Math.min(2 + Math.floor(wave / 2), 5);
  const spacingX = 80;
  const spacingY = 60;
  const startX = (W - (cols - 1) * spacingX) / 2;
  const startY = 40;

  // Pick enemy type based on wave
  const typeIdx = Math.min(Math.floor(wave / 2), enemyTypes.length - 1);
  const eType = enemyTypes[typeIdx];

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      // Random missing enemies for variety
      if (Math.random() < 0.1) continue;
      const ex = startX + c * spacingX;
      const ey = startY + r * spacingY;

      // Variation: mix in some weaker enemies
      const actualType = r < 2 && wave > 2
        ? enemyTypes[Math.min(typeIdx + 1, enemyTypes.length - 1)]
        : enemyTypes[Math.max(typeIdx - 1, 0)];

      enemies.push(createEnemy(ex, ey, actualType, 'wave'));
    }
  }
}

function spawnPowerup(x, y) {
  if (Math.random() < 0.12) {
    const types = ['power'];
    powerups.push(createPowerup(x, y, types[Math.floor(Math.random() * types.length)]));
  }
}

// ─── PLAYER FIRE ───
function playerFire() {
  sfxShoot();
  const pw = player.power;
  if (pw >= 1) bullets.push(createBullet(player.x, player.y - 12));
  if (pw >= 2) {
    bullets.push(createBullet(player.x - 8, player.y - 6));
    bullets.push(createBullet(player.x + 8, player.y - 6));
  }
  if (pw >= 3) {
    bullets[bullets.length - 3].vx = -0.5;
    bullets[bullets.length - 2].vx = 0.5;
  }
  player.fireTimer = player.fireRate - player.power;
}

// ─── UPDATE ───
function update() {
  if (gameState !== 'playing') return;
  frame++;

  // Player movement
  if (keys['ArrowLeft'] || keys['KeyA'] || keys['KeyQ']) player.x -= player.speed;
  if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;
  if (keys['ArrowUp'] || keys['KeyZ'] || keys['KeyW']) player.y -= player.speed;
  if (keys['ArrowDown'] || keys['KeyS']) player.y += player.speed;
  player.x = Math.max(20, Math.min(W - 20, player.x));
  player.y = Math.max(20, Math.min(H - 20, player.y));

  // Fire
  if (player.fireTimer > 0) player.fireTimer--;
  if ((keys['Space'] || keys['KeyZ']) && player.fireTimer <= 0) {
    playerFire();
  }

  // Invincibility
  if (player.invincible > 0) player.invincible--;

  // Combo timer
  if (comboTimer > 0) comboTimer--;
  else comboCounter = 0;

  // Spawn enemies
  waveTimer--;
  if (waveTimer <= 0 && enemies.length === 0) {
    spawnWave();
    waveTimer = 120 + wave * 20;
    level++;
    // Speed up enemies as levels progress
    enemies.forEach(e => e.speed += 0.05 * wave);
  }

  // Update bullets
  for (const b of bullets) {
    b.y += b.speed;
    if (b.vx) b.x += b.vx;
    if (b.y < -20 || b.y > H + 20) b.active = false;
  }
  bullets = bullets.filter(b => b.active);

  // Update enemy bullets
  for (const b of enemyBullets) {
    b.y += b.speed;
    if (b.y > H + 20) b.active = false;
  }
  enemyBullets = enemyBullets.filter(b => b.active);

  // Update enemies
  for (const e of enemies) {
    e.timer++;

    // Movement patterns
    if (e.pattern === 'wave') {
      e.x = e.originX + Math.sin(e.timer * 0.02 + e.y * 0.01) * 30;
      e.y += e.speed * 0.3;
    } else {
      e.y += e.speed;
    }

    // Shooting
    e.shootTimer--;
    if (e.shootTimer <= 0 && e.y > 20 && e.y < H * 0.6) {
      enemyBullets.push(createBullet(e.x, e.y + 10, true, 1.5 + Math.random()));
      e.shootTimer = e.shootRate - wave * 2;
      if (e.shootTimer < 40) e.shootTimer = 40;
    }

    // Off screen
    if (e.y > H + 30) e.active = false;
  }

  // Update powerups
  for (const p of powerups) {
    p.y += p.speed;
    if (p.y > H + 20) p.active = false;
  }
  powerups = powerups.filter(p => p.active);

  // ─── COLLISIONS ───

  // Bullets vs enemies
  for (const b of bullets) {
    if (!b.active) continue;
    for (const e of enemies) {
      if (!e.active) continue;
      if (Math.abs(b.x - e.x) < e.w/2 + 4 && Math.abs(b.y - e.y) < e.h/2 + 4) {
        b.active = false;
        e.hp--;
        if (e.hp <= 0) {
          e.active = false;
          const pts = e.score * (1 + comboCounter * 0.1);
          score += Math.floor(pts);
          comboCounter++;
          comboTimer = 120;
          particles.push(...createParticle(e.x, e.y, '#0f0', 12));
          particles.push(...createParticle(e.x, e.y, '#ff0', 6));
          sfxExplode();
          // Screen shake on enemy death - bigger for tougher enemies
          if (e.maxHp >= 2) {
            triggerScreenShake(2 + e.maxHp);
          } else {
            triggerScreenShake(0.5);
          }
          spawnPowerup(e.x, e.y);
        } else {
          sfxHit();
          particles.push(...createParticle(e.x, e.y, '#0f0', 4));
        }
        updateUI();
        break;
      }
    }
  }

  // Enemy bullets vs player
  if (player.invincible <= 0) {
    for (const b of enemyBullets) {
      if (!b.active) continue;
      if (Math.abs(b.x - player.x) < 14 && Math.abs(b.y - player.y) < 14) {
        b.active = false;
        hitPlayer();
        break;
      }
    }

    // Enemies vs player
    for (const e of enemies) {
      if (!e.active) continue;
      if (Math.abs(e.x - player.x) < e.w/2 + 10 && Math.abs(e.y - player.y) < e.h/2 + 10) {
        e.active = false;
        particles.push(...createParticle(e.x, e.y, '#f00', 16));
        sfxExplode();
        hitPlayer();
        break;
      }
    }
  }

  // Powerups vs player
  for (const p of powerups) {
    if (!p.active) continue;
    if (Math.abs(p.x - player.x) < 24 && Math.abs(p.y - player.y) < 24) {
      p.active = false;
      if (p.type === 'power' && player.power < 4) player.power++;
      sfxPowerup();
    }
  }
  powerups = powerups.filter(p => p.active);

  // Update particles
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
  }
  particles = particles.filter(p => p.life > 0);

  // Remove dead enemies
  enemies = enemies.filter(e => e.active);

  // Update UI
  updateUI();
}

function hitPlayer() {
  lives--;
  player.invincible = 120;
  player.power = Math.max(1, player.power - 1);
  particles.push(...createParticle(player.x, player.y, '#f00', 20));
  sfxGameOver();
  // Raster tear effect on player hit
  triggerRasterTear();

  if (lives <= 0) {
    gameOver();
  }
}

function gameOver() {
  gameState = 'gameover';
  if (score > hiScore) {
    hiScore = score;
    localStorage.setItem('ibmShmupHiScore', hiScore);
  }
  finalScoreSpan.textContent = score;
  gameOverScreen.style.display = 'flex';
  updateUI();
}

function updateUI() {
  scoreSpan.textContent = String(score).padStart(5, '0');
  hiScoreSpan.textContent = String(hiScore).padStart(5, '0');
}

// ─── DRAWING ───
function drawText(x, y, lines, color = '#0f0') {
  ctx.font = '14px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = color;
  lines.forEach((line, i) => {
    ctx.fillText(line, x, y + i * 28);
  });
}

function draw() {
  ctx.save();

  // ─── CRTC 6845 RASTER EFFECTS ───
  updateRasterEffects();

  // Screen shake
  if (screenShake.intensity > 0) {
    ctx.translate(screenShake.x, screenShake.y);
  }

  // Subtle horizontal sync jitter
  ctx.translate(syncJitter, 0);

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // ─── GRID (subtle phosphor) ───
  ctx.strokeStyle = 'rgba(0,255,0,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  if (gameState === 'playing' || gameState === 'paused' || gameState === 'gameover') {
    // Draw player
    if (gameState !== 'gameover' && player.invincible % 6 < 3) {
      const pg = Glyphs.player;
      ctx.fillStyle = '#0f0';
      drawText(player.x, player.y - 14, [pg[0], pg[1], pg[2], pg[3]]);
    }

    // Draw bullets
    ctx.fillStyle = '#0f0';
    for (const b of bullets) {
      ctx.fillRect(b.x - 1, b.y - 5, 3, 10);
    }

    // Draw enemy bullets
    ctx.fillStyle = '#ff0';
    for (const b of enemyBullets) {
      ctx.fillRect(b.x - 2, b.y - 2, 4, 4);
      ctx.fillStyle = '#0f0';
    }

    // Draw enemies
    for (const e of enemies) {
      const lines = e.glyph;
      // Flash when hit
      const color = e.hp < e.maxHp && frame % 4 < 2 ? '#ff0' : '#0f0';
      drawText(e.x, e.y - (lines.length/2) * 14, lines, color);

      // HP bar for tough enemies
      if (e.maxHp > 1) {
        ctx.fillStyle = '#0a0';
        ctx.fillRect(e.x - 10, e.y - 16, 20, 3);
        ctx.fillStyle = '#0f0';
        ctx.fillRect(e.x - 10, e.y - 16, 20 * (e.hp / e.maxHp), 3);
      }
    }

    // Draw powerups
    for (const p of powerups) {
      const lines = Glyphs.powerup;
      ctx.fillStyle = '#0ff';
      drawText(p.x, p.y, lines, '#0ff');
    }

    // Draw particles
    for (const p of particles) {
      const alpha = p.life / p.maxLife;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      // ASCII-like particle shapes
      const chars = ['*', '+', '.', '°'];
      ctx.font = '12px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(chars[Math.floor(Math.random() * chars.length)], p.x, p.y);
    }
    ctx.globalAlpha = 1;

    // Lives indicator
    ctx.fillStyle = '#0f0';
    ctx.font = '14px monospace';
    ctx.textAlign = 'left';
    let livesStr = '';
    for (let i = 0; i < lives; i++) livesStr += '▲ ';
    ctx.fillText(livesStr, 16, H - 16);

    // Power level
    ctx.textAlign = 'right';
    ctx.fillText('PWR:' + player.power, W - 16, H - 16);

    // Level / Wave
    ctx.textAlign = 'center';
    ctx.font = '12px monospace';
    ctx.fillStyle = 'rgba(0,255,0,0.4)';
    ctx.fillText('WAVE ' + wave, W/2, H - 16);

    // Combo
    if (comboCounter > 1) {
      ctx.fillStyle = '#ff0';
      ctx.textAlign = 'center';
      ctx.font = '16px monospace';
      ctx.fillText('×' + comboCounter, W/2, 30);
    }

    // Pause indicator
    if (gameState === 'paused') {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#0f0';
      ctx.font = '24px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', W/2, H/2);
      ctx.font = '14px monospace';
      ctx.fillText('PRESS P TO CONTINUE', W/2, H/2 + 30);
    }
  }

  // ─── RASTER TEAR (CRTC 6845 scanline offset) ───
  if (rasterTear.active) {
    ctx.save();
    // Create a tearing effect by drawing a shifted copy of the top portion
    const tearY = 200 + Math.sin(frame * 0.3) * 60;
    const tearH = 40;
    ctx.beginPath();
    ctx.rect(0, tearY, W, tearH);
    ctx.clip();
    ctx.translate(rasterTear.offset * 0.5, 0);
    // Redraw a shifted copy of the torn area
    ctx.fillStyle = 'rgba(0,255,0,0.03)';
    ctx.fillRect(0, tearY, W, tearH);
    // Horizontal displacement lines
    ctx.strokeStyle = 'rgba(0,255,0,0.15)';
    ctx.lineWidth = 1;
    for (let scanY = 0; scanY < tearH; scanY += 4) {
      const scanShift = Math.sin(scanY * 0.5 + frame * 0.2) * 3;
      ctx.beginPath();
      ctx.moveTo(0, tearY + scanY);
      ctx.lineTo(W, tearY + scanY);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Phosphor glow effect
  ctx.fillStyle = 'rgba(0,255,0,0.015)';
  ctx.fillRect(0, 0, W, H);

  ctx.restore();
}

// ─── GAME LOOP ───
function gameLoop() {
  update();
  draw();
  drawCrtOverlay();
  requestAnimationFrame(gameLoop);
}

// ─── CRT OVERLAY — barrel distortion + vignette ───
const crtOverlay = document.getElementById('crt-overlay');
const crtCtx = crtOverlay.getContext('2d');

function drawCrtOverlay() {
  const w = 800, h = 600;
  crtCtx.clearRect(0, 0, w, h);

  // 1. CRT curvature frame — teken een gebogen rand zodat het beeld convex lijkt
  // Donkere hoek-uitsnede met bezel curves
  const curve = 60; // curve radius
  crtCtx.beginPath();
  // Start bij rechterbovenhoek
  crtCtx.moveTo(curve, 0);
  // Bovenrand (bijna recht, lichte curve)
  crtCtx.quadraticCurveTo(w/2, -8, w - curve, 0);
  // Rechterbovenhoek
  crtCtx.quadraticCurveTo(w + 2, h/2, w - curve, h);
  // Onderrand (bijna recht, lichte curve)
  crtCtx.quadraticCurveTo(w/2, h + 8, curve, h);
  // Linkerbenedenhoek  
  crtCtx.quadraticCurveTo(-2, h/2, curve, 0);
  crtCtx.closePath();

  // Buitenkant = zwart (CRT bezel), binnenkant = doorzichtig
  crtCtx.fillStyle = '#000';

  // Gebruik een clipping / compositing truc
  crtCtx.save();
  // Eerst het hele canvas vullen met zwart
  crtCtx.fillRect(0, 0, w, h);
  // Dan de curve-uitsparing eruit snijden
  crtCtx.globalCompositeOperation = 'destination-out';
  crtCtx.beginPath();
  crtCtx.moveTo(curve, 0);
  crtCtx.quadraticCurveTo(w/2, -6, w - curve, 0);
  crtCtx.quadraticCurveTo(w + 1, h/2, w - curve, h);
  crtCtx.quadraticCurveTo(w/2, h + 6, curve, h);
  crtCtx.quadraticCurveTo(-1, h/2, curve, 0);
  crtCtx.closePath();
  crtCtx.fill();
  crtCtx.restore();

  // 2. Vignette — donkere hoeken over het zichtbare beeld
  const grad = crtCtx.createRadialGradient(w/2, h/2, h*0.25, w/2, h/2, h*0.7);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(0.5, 'rgba(0,0,0,0)');
  grad.addColorStop(0.75, 'rgba(0,0,0,0.08)');
  grad.addColorStop(0.9, 'rgba(0,0,0,0.18)');
  grad.addColorStop(1, 'rgba(0,0,0,0.35)');
  crtCtx.fillStyle = grad;
  crtCtx.fillRect(0, 0, w, h);

  // 3. Subtle center glow (phosphor glow)
  const glow = crtCtx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w*0.25);
  glow.addColorStop(0, 'rgba(0,200,0,0.03)');
  glow.addColorStop(1, 'rgba(0,200,0,0)');
  crtCtx.fillStyle = glow;
  crtCtx.fillRect(0, 0, w, h);

  // 4. Scanline halation — extra phosphor persistence bands
  crtCtx.fillStyle = 'rgba(0,255,0,0.006)';
  for (let y = 0; y < h; y += 4) {
    crtCtx.fillRect(0, y, w, 1);
  }
}

// ─── KEYBOARD ───
document.addEventListener('keydown', (e) => {
  keys[e.code] = true;

  if (e.code === 'KeyP' && gameState === 'playing') {
    gameState = 'paused';
  } else if (e.code === 'KeyP' && gameState === 'paused') {
    gameState = 'playing';
  }

  // Also handle Space/Enter during boot to skip quickly, or during title
  if (gameState === 'title' && (e.code === 'Space' || e.code === 'Enter')) {
    if (bootRunning) {
      // Skip boot — handled via a flag
    }
    startGame();
  }

  if (gameState === 'gameover' && (e.code === 'Space' || e.code === 'Enter')) {
    startGame();
  }

  // Prevent scrolling
  if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
    e.preventDefault();
  }
});

document.addEventListener('keyup', (e) => {
  keys[e.code] = false;
});

// ─── START ───
hiScoreSpan.textContent = String(hiScore).padStart(5, '0');
// Start with boot sequence
titleScreen.style.display = 'none';
bootScreen.style.display = 'flex';
runBootSequence();
gameLoop();
</script>
