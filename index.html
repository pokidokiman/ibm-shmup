<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBM SHMUP - PRESS SPACE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#010401;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;font-family:'Courier New',Courier,monospace}

#monitor{
  position:relative;
  width:1200px;height:900px;
  background:#050a05;
  border:22px solid #2a2a2a;
  border-radius:40px;
  box-shadow:0 30px 60px rgba(0,0,0,0.8),inset 0 0 100px rgba(0,0,0,0.6),inset 0 0 30px rgba(0,20,0,0.4);
  overflow:hidden;
}

#game-canvas{
  position:absolute;
  top:40px;left:50%;
  width:1100px;height:825px;
  margin-left:-550px;
  display:block;
  filter:url(#crt-barrel);
  border-radius:10px;
}

#scanlines{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:linear-gradient(to bottom,rgba(0,0,0,0) 50%,rgba(0,0,0,0.15) 50%);
  background-size:100% 3px;
  pointer-events:none;z-index:10;
}

#vignette{
  position:absolute;top:40px;left:50%;
  width:820px;height:615px;
  margin-left:-410px;
  background:radial-gradient(ellipse at 50% 50%,
    transparent 45%,
    rgba(0,0,0,0.28) 68%,
    rgba(0,0,0,0.70) 88%,
    rgba(0,0,0,0.88) 100%
  );
  pointer-events:none;z-index:11;
  border-radius:10px;
}

#glass{
  position:absolute;top:40px;left:50%;
  width:820px;height:615px;
  margin-left:-410px;
  background:linear-gradient(145deg,rgba(255,255,255,0.030) 0%,transparent 40%,transparent 60%,rgba(255,255,255,0.010) 100%);
  pointer-events:none;z-index:12;
  border-radius:10px;
}
</style>
</head>
<body>
<div id="monitor">
  <div id="scanlines"></div>
  <canvas id="game-canvas" width="1024" height="768"></canvas>
  <div id="vignette"></div>
  <div id="glass"></div>
</div>

<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <filter id="crt-barrel" filterUnits="objectBoundingBox" x="-15%" y="-15%" width="130%" height="130%">
      <feImage id="sphereMap" result="map" href=""/>
      <feDisplacementMap in="SourceGraphic" in2="map" scale="60" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<script>
(function(){
  const S=256,k=0.38;
  const c=document.createElement('canvas');c.width=S;c.height=S;
  const cx=c.getContext('2d'),id=cx.createImageData(S,S),d=id.data;
  for(let y=0;y<S;y++)for(let x=0;x<S;x++){
    const nx=(x/S)*2-1,ny=(y/S)*2-1,r2=nx*nx+ny*ny;
    const i=(y*S+x)*4;
    d[i  ]=Math.max(0,Math.min(255,Math.round((nx*k*r2+1)*127.5)));
    d[i+1]=Math.max(0,Math.min(255,Math.round((ny*k*r2+1)*127.5)));
    d[i+2]=128;d[i+3]=255;
  }
  cx.putImageData(id,0,0);
  document.getElementById('sphereMap').setAttribute('href',c.toDataURL());
})();

const canvas=document.getElementById('game-canvas');
const ctx=canvas.getContext('2d');
const W=1024,H=768;
const BG='#010401';
const FG='#33ff33';
const MONO='"Courier New",Courier,monospace';
const audioCtx=new (window.AudioContext||window.webkitAudioContext)();

function blip(f,d,t='square',v=0.08){
  try{
    if(audioCtx.state==='suspended')audioCtx.resume();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);
    o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d);
  }catch(e){}
}
function sfxShoot(){blip(800,0.08)}
function sfxHit(){blip(200,0.15,'sawtooth',0.08)}
function sfxExplode(){blip(100,0.3,'sawtooth',0.1);blip(60,0.4)}
function sfxPowerup(){blip(600,0.1);setTimeout(()=>blip(900,0.15),100)}
function sfxGameOver(){blip(300,0.2);setTimeout(()=>blip(200,0.2),200);setTimeout(()=>blip(100,0.4),400)}

const Glyphs={
  player:[' ▲ ','╱ ╲','╲ ╱'],
  enemy1:['╱╲','││','╲╱'],
  enemy2:['┌┐','│├┤│','└┘'],
  enemy3:['┌┬┐','│├┼┤│','└┴┘'],
  powerup:['╔═╗','║P║','╚═╝'],
  boss:['┌────┐','│ ╔══╗ │','│ ║■■║ │','│ ╚══╝ │','└────┘'],
  bullet:['│'],
  ebul1:['*'],
  ebul2:['o'],
};
let gs='title',score=0,hs=parseInt(localStorage.getItem('hs'))||0,lives=3,wave=0,frame=0,waveType=0;
let keys={},pl,buls,enems,ebuls,pups,parts,boss=null;
let wt=0,cc=0,ct=0,spawnTimer=0;

function mkPl(){return{x:W/2,y:H-100,w:24,h:30,speed:5,fire:6,ft:0,pw:1,inv:0}}
function mkBul(x,y,en=false,sp=7){return{x,y,w:4,h:10,sp:en?sp:-sp,en,act:true}}
const eTypes=[
  {g:Glyphs.enemy1,hp:1,sp:1.5,sc:100,sr:100,w:16,h:16},
  {g:Glyphs.enemy2,hp:2,sp:2.0,sc:200,sr:80,w:20,h:18},
  {g:Glyphs.enemy3,hp:4,sp:1.2,sc:400,sr:120,w:24,h:20},
];
function mkEn(x,y,type,pat){return{x,y,type,hp:type.hp,mh:type.hp,g:type.g,w:type.w,h:type.h,sp:type.sp,sc:type.sc,sr:type.sr,st:Math.random()*type.sr,pat:pat||'d',act:true,ox:x,oy:y,ti:0}}
function mkBoss(){return{x:W/2,y:80,w:80,h:60,hp:30+wave*10,mh:30+wave*10,g:Glyphs.boss,sc:2000,sp:0.6,sr:40,st:0,pat:'boss',act:true,ox:W/2,oy:80,ti:0,phase:0}}
function mkPup(x,y,ty='p'){return{x,y,w:30,h:18,ty,sp:2,act:true}}
function mkParts(x,y,col,n=8){
  const p=[];
  for(let i=0;i<n;i++){const a=Math.PI*2/n*i;p.push({x,y,vx:Math.cos(a)*(1+Math.random()*3),vy:Math.sin(a)*(1+Math.random()*3),l:20+Math.random()*20,ml:40,col})}
  return p;
}
function reset(){score=0;lives=3;wave=0;frame=0;cc=0;ct=0;waveType=0;pl=mkPl();buls=[];enems=[];ebuls=[];pups=[];parts=[];boss=null;wt=60;spawnTimer=0}

const bL=[
  {t:'',d:200},{t:'IBM 5153 BIOS v1.11 01/10/84',d:300},{t:'Copyright 1984 IBM Corp.',d:200},{t:'',d:150},
  {t:'  CPU: Intel 8088 @ 4.77 MHz',d:150},{t:'  Coprocessor: None',d:100},{t:'',d:100},
  {t:'Memory Test:     ',d:80,mem:true},{t:'',d:150},{t:'  IBM SHMUP v1.0 detected',d:400},{t:'',d:100},
  {t:'  2 Floppy drive(s) detected',d:300},{t:'',d:150},{t:'  Starting MS-DOS...',d:600},{t:'',d:200},
];
let bootLines=[],showTitle=false,bootRunning=true,bootDone=false,gameOverShow=false,goTime=0,cancelled=false,bossDead=false;

function boot(){
  bootRunning=true;bootDone=false;showTitle=false;gameOverShow=false;
  let li=0,ci=0,mem=0,bt=[];
  function n(){
    if(cancelled)return;
    if(li>=bL.length){
      bt.push('');bt.push('$ PRESS SPACE');
      bootLines=bt;bootRunning=false;bootDone=true;showTitle=true;startMatrixRain();return;
    }
    const l=bL[li];
    if(l.mem){
      mem=0;(function mt(){
        mem+=Math.floor(8+Math.random()*24);
        if(mem>=640){mem=640;bt.push(l.t+'0640 KB OK');li++;setTimeout(n,200);return}
        const ml=l.t+String(mem).padStart(4,' ')+' KB';
        if(bt.length>0&&bt[bt.length-1].startsWith(l.t.trim()))bt[bt.length-1]=ml;else bt.push(ml);
        bootLines=[...bt];setTimeout(mt,30)
      })();return
    }
    if(ci<l.t.length){
      if(bt.length===0||ci===0&&li===0)bt.push('');
      bt[bt.length-1]+=l.t[ci];ci++;
      bootLines=[...bt];setTimeout(n,20+Math.random()*20);
    }else{
      bt.push('');ci=0;li++;bootLines=[...bt];setTimeout(n,l.d)
    }
  }
  bootLines=[];setTimeout(n,100)
}

function startGame(){
  if(bootRunning)return;
  showTitle=false;gameOverShow=false;reset();gs='playing';
  stopMatrixRain();
}

function up(){
  if(gs!=='playing')return;frame++;
  if(keys['ArrowLeft']||keys['KeyA']||keys['KeyQ'])pl.x-=pl.speed;
  if(keys['ArrowRight']||keys['KeyD'])pl.x+=pl.speed;
  if(keys['ArrowUp']||keys['KeyW']||keys['KeyZ'])pl.y-=pl.speed;
  if(keys['ArrowDown']||keys['KeyS'])pl.y+=pl.speed;
  pl.x=Math.max(120,Math.min(W-120,pl.x));pl.y=Math.max(20,Math.min(H-20,pl.y));
  if(pl.ft>0)pl.ft--;
  if((keys['Space']||keys['KeyZ'])&&pl.ft<=0){
    if(pl.pw>=1)buls.push(mkBul(pl.x,pl.y-12));
    if(pl.pw>=2){buls.push(mkBul(pl.x-10,pl.y-6));buls.push(mkBul(pl.x+10,pl.y-6))}
    if(pl.pw>=3){buls[buls.length-2].vx=-0.6;buls[buls.length-1].vx=0.6}
    if(pl.pw>=4){buls.push(mkBul(pl.x-6,pl.y-20,false,9));buls.push(mkBul(pl.x+6,pl.y-20,false,9))}
    pl.ft=Math.max(3,pl.fire-pl.pw);
    sfxShoot();
  }
  if(pl.inv>0)pl.inv--;
  if(ct>0)ct--;else cc=0;
  
  // ─── WAVE & SPAWN LOGIC ───
  if(wt>0)wt--;
  // Als boss dood is en wt==0, bossDead clearen zodat wave kan doorstromen  
  if(wt<=0&&!boss&&bossDead)bossDead=false;
  
  // Check for boss wave (every 5 waves, after enemies are gone)
  if(wave>0&&wave%5===0&&!boss&&enems.length===0&&wt<=0&&!bossDead){
    boss=mkBoss();
    sfxFloppySeek();
  }
  
  // Spawn enemies
  if(spawnTimer>0)spawnTimer--;
  
  if(wt<=0&&!boss&&spawnTimer<=0&&(enems.length===0||wt<=-300)){
    wave++;
    waveType=(wave%5===0)?4:wave%4;
    const isBossWave=wave%5===0;
    
    if(!isBossWave){
      // Normal wave — spawn enemies with patterns
      bossDead=false;
      const ti=Math.min(Math.floor((wave-1)/2),eTypes.length-1);
      const count=5+Math.floor(wave/2);
      const patterns=['sin','zig','duik','snell'];
      
      for(let i=0;i<count;i++){
        const et=eTypes[Math.max(0,ti-1+Math.floor(Math.random()*2))];
        const pat=patterns[i%patterns.length];
        const x=120+Math.random()*(W-240);
        const y=-40-i*50;
        enems.push(mkEn(x,y,et,pat));
      }
      wt=60+wave*10;
    }else{
      // Boss wave — brief pauze voor boss spawn
      wt=60;
    }
    sfxFloppySeek();
  }
  
  // ─── ENEMY BEHAVIOR ───
  for(const e of enems){
    e.ti++;
    if(e.pat==='sin'){e.x=e.ox+Math.sin(e.ti*0.04)*150;e.y+=e.sp}
    else if(e.pat==='zig'){e.x+=Math.sin(e.ti*0.1)*3;e.y+=e.sp*1.2}
    else if(e.pat==='duik'){if(e.ti<60){e.y+=e.sp*0.8;e.x+=Math.sin(e.ti*0.05)*2}else{e.y+=e.sp*2.5}}
    else if(e.pat==='snell'){e.y+=e.sp*1.8}
    else{e.y+=e.sp}
    
    e.st--;if(e.st<=0&&e.y>20&&e.y<H*0.5){ebuls.push(mkBul(e.x,e.y+10,true,1.5+Math.random()));e.st=Math.max(60,e.sr-wave*3)}
    if(e.y>H+30||e.x<-100||e.x>W+100)e.act=false
  }
  
  // ─── BOSS BEHAVIOR ───
  if(boss){
    boss.ti++;
    // Phase-based movement
    if(boss.ti<120){
      // Enter screen
      boss.y=Math.max(60,boss.y-0.5);
    }else{
      // Move side to side
      boss.x=boss.ox+Math.sin(boss.ti*0.015)*250;
      boss.y=80+Math.sin(boss.ti*0.02)*30;
      
      // Shoot patterns
      boss.st--;
      if(boss.st<=0){
        if(boss.ti%240<120){
          // Spread shot
          for(let a=-2;a<=2;a++)ebuls.push(mkBul(boss.x+a*15,boss.y+30,true,2));
        }else{
          // Aimed shot
          ebuls.push(mkBul(boss.x,boss.y+30,true,3));
          ebuls.push(mkBul(boss.x-20,boss.y+25,true,2.5));
          ebuls.push(mkBul(boss.x+20,boss.y+25,true,2.5));
        }
        boss.st=Math.max(20,boss.sr-boss.ti*0.01);
      }
    }
  }
  for(const b of buls){b.y+=b.sp;if(b.vx)b.x+=b.vx;if(b.y<-20||b.y>H+20)b.act=false}
  buls=buls.filter(b=>b.act);
  for(const b of ebuls){b.y+=b.sp;if(b.y>H+20)b.act=false}
  ebuls=ebuls.filter(b=>b.act);
  for(const p of pups){p.y+=p.sp;if(p.y>H+20)p.act=false}
  pups=pups.filter(p=>p.act);
  for(const b of buls){if(!b.act)continue;for(const e of enems){if(!e.act)continue;if(Math.abs(b.x-e.x)<e.w/2+6&&Math.abs(b.y-e.y)<e.h/2+6){b.act=false;e.hp--;if(e.hp<=0){e.act=false;const pts=Math.floor(e.sc*(1+cc*0.1));score+=pts;cc++;ct=120;parts.push(...mkParts(e.x,e.y,'#0f0',12),...mkParts(e.x,e.y,'#ff0',6));sfxExplode();if(Math.random()<0.12)pups.push(mkPup(e.x,e.y))}else{parts.push(...mkParts(e.x,e.y,'#0f0',4));sfxHit()}break}}}
  // Boss collision
  if(boss){for(const b of buls){if(!b.act)continue;if(Math.abs(b.x-boss.x)<boss.w/2&&Math.abs(b.y-boss.y)<boss.h/2){b.act=false;boss.hp--;parts.push(...mkParts(b.x,b.y,'#ff0',6));sfxHit();if(boss.hp<=0){const pts=boss.sc;score+=pts;parts.push(...mkParts(boss.x,boss.y,'#0f0',30),...mkParts(boss.x,boss.y,'#ff0',20));sfxExplode();boss=null;wt=120;bossDead=true;break;}}}}
  if(pl.inv<=0){
    for(const b of ebuls){if(!b.act)continue;if(Math.abs(b.x-pl.x)<16&&Math.abs(b.y-pl.y)<16){b.act=false;hit();break}}
    if(pl.inv<=0)for(const e of enems){if(!e.act)continue;if(Math.abs(e.x-pl.x)<e.w/2+12&&Math.abs(e.y-pl.y)<e.h/2+12){e.act=false;parts.push(...mkParts(e.x,e.y,'#f00',16));hit();break}}
    if(pl.inv<=0&&boss&&Math.abs(boss.x-pl.x)<boss.w/2+12&&Math.abs(boss.y-pl.y)<boss.h/2+12){parts.push(...mkParts(boss.x,boss.y+20,'#f00',16));hit()}
  }
  for(const p of pups){if(!p.act)continue;if(Math.abs(p.x-pl.x)<28&&Math.abs(p.y-pl.y)<28){p.act=false;if(p.ty==='p'){if(pl.pw<4)pl.pw++;else score+=500;sfxPowerup()}}}
  pups=pups.filter(p=>p.act);
  for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.l--}
  parts=parts.filter(p=>p.l>0);enems=enems.filter(e=>e.act)
}
function hit(){lives--;pl.inv=120;pl.pw=Math.max(1,pl.pw-1);parts.push(...mkParts(pl.x,pl.y,'#f00',20));triggerRasterTear();if(lives<=0){gs='gameover';sfxGameOver();if(score>hs){hs=score;localStorage.setItem('hs',hs)}gameOverShow=true;goTime=performance.now()}}

// ─── FLOPPY DRIVE SEEK SOUND ───
function sfxFloppySeek(){
  try{
    if(audioCtx.state==='suspended')audioCtx.resume();
    const dur=0.8,sr=audioCtx.sampleRate,bs=Math.floor(sr*dur);
    const buf=audioCtx.createBuffer(1,bs,sr),d=buf.getChannelData(0);
    for(let i=0;i<bs;i++){
      const t=i/sr;
      const rumble=(Math.random()*2-1)*0.3,scrape=(Math.random()*2-1)*0.5;
      const cr=60+Math.sin(t*8)*20,cp=(t*cr)%1,click=cp<0.05?0.7:0;
      d[i]=rumble*0.3+scrape*0.5+click*0.8;
    }
    for(let i=1;i<bs;i++)d[i]=d[i]*0.4+d[i-1]*0.6;
    const src=audioCtx.createBufferSource();src.buffer=buf;
    const flt=audioCtx.createBiquadFilter();flt.type='bandpass';flt.frequency.value=800;flt.Q.value=0.8;
    const gn=audioCtx.createGain();gn.gain.setValueAtTime(0.15,audioCtx.currentTime);gn.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    src.connect(flt);flt.connect(gn);gn.connect(audioCtx.destination);src.start();src.stop(audioCtx.currentTime+dur);
  }catch(e){}
}

// ─── CRTC 6845 RASTER EFFECTS ───
let screenShake={x:0,y:0,intensity:0};
let rasterTear={active:false,offset:0,timer:0};
let syncJitter=0;

function triggerScreenShake(intensity){screenShake.intensity=Math.max(screenShake.intensity,intensity)}
function triggerRasterTear(){rasterTear.active=true;rasterTear.offset=Math.floor(Math.random()*200)-100;rasterTear.timer=20}
function updateRasterEffects(){
  if(screenShake.intensity>0){
    screenShake.x=(Math.random()-0.5)*screenShake.intensity*6;
    screenShake.y=(Math.random()-0.5)*screenShake.intensity*4;
    screenShake.intensity*=0.85;
    if(screenShake.intensity<0.3){screenShake.intensity=0;screenShake.x=0;screenShake.y=0}
  }
  if(rasterTear.active){rasterTear.timer--;if(rasterTear.timer<=0){rasterTear.active=false;rasterTear.offset=0}}
  syncJitter=(Math.random()-0.5)*0.6;
}

// ─── MATRIX RAIN ON TITLE ───
let matrixDrops=[],matrixAnimId=null;
const matrixChars='アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';

function startMatrixRain(){
  const cols=Math.floor(W/17);matrixDrops=[];
  for(let i=0;i<cols;i++)matrixDrops[i]=Math.floor(Math.random()*-100);
  if(matrixAnimId)cancelAnimationFrame(matrixAnimId);
  drawMatrixRain();
}
function drawMatrixRain(){
  // Draw on the main canvas — subtle overlay on title screen
  const mc=ctx;mc.save();
  mc.fillStyle='rgba(1,4,1,0.08)';mc.fillRect(0,0,W,H);
  mc.font='12px monospace';mc.textAlign='center';
  for(let i=0;i<matrixDrops.length;i++){
    const x=i*17+8,y=matrixDrops[i]*17;
    const ch=matrixChars[Math.floor(Math.random()*matrixChars.length)];
    mc.fillStyle='rgba(0,255,0,0.05)';mc.fillText(ch,x,y);
    mc.fillStyle='rgba(0,255,0,0.25)';mc.fillText(ch,x,y-17);
    matrixDrops[i]+=0.4;
    if(matrixDrops[i]*17>H&&Math.random()>0.975)matrixDrops[i]=0;
  }
  mc.restore();matrixAnimId=requestAnimationFrame(drawMatrixRain);
}
function stopMatrixRain(){if(matrixAnimId){cancelAnimationFrame(matrixAnimId);matrixAnimId=null}}

function glow(col,blur){ctx.shadowColor=col;ctx.shadowBlur=blur}
function noGlow(){ctx.shadowBlur=0}

// ─── SCROLLING BACKGROUND ───
const stars=[];
for(let i=0;i<80;i++)stars.push({x:120+Math.random()*(W-240),y:Math.random()*H,s:0.5+Math.random()*2.5,v:0.3+Math.random()*1.2,c:Math.random()>0.7?'#66ff66':'#33ff33'});
const cityLights=[];
for(let i=0;i<50;i++)cityLights.push({x:120+Math.random()*(W-240),w:8+Math.random()*35,h:20+Math.random()*80,b:Math.random()>0.3});
let scrollY=0;

function drawBackground(){
  scrollY+=2;
  
  ctx.fillStyle='#010401';ctx.fillRect(0,0,W,H);
  
  // Stars — meerdere lagen voor diepte
  for(const s of stars){
    s.y+=s.v;
    if(s.y>H){s.y=-5;s.x=120+Math.random()*(W-240);s.v=0.5+Math.random()*2}
    ctx.globalAlpha=0.2+Math.sin(s.y*0.015+frame*0.03)*0.15;
    ctx.fillStyle=s.c;
    ctx.fillRect(s.x,s.y,s.s*1.5,s.s*1.5);
  }
  
  // Cityscape
  ctx.globalAlpha=0.2;
  const scrollOff=(scrollY*0.3)%160;
  
  for(const cl of cityLights){
    const by=H-40-(cl.h*0.4)+scrollOff;
    if(by>H||by<-80)continue;
    ctx.fillStyle='#0a1a0a';
    ctx.fillRect(cl.x,by,cl.w,80);
    if(cl.b){
      ctx.fillStyle='#33ff33';
      ctx.globalAlpha=0.06+Math.sin(cl.x*0.15+scrollY*0.03)*0.04;
      for(let wy=by+5;wy<by+60;wy+=10)
        for(let wx=cl.x+4;wx<cl.x+cl.w-4;wx+=8)
          ctx.fillRect(wx,wy,3,4);
    }
  }
  
  // Ground strip
  ctx.globalAlpha=0.15;
  ctx.fillStyle='#0a2a0a';
  ctx.fillRect(0,H-4,W,4);
  ctx.fillStyle='#1a4a1a';
  for(let x=0;x<W;x+=4){
    const h=1+Math.sin((x+scrollY)*0.3)*2;
    ctx.fillRect(x,H-4-h,2,h);
  }
  
  ctx.globalAlpha=1;
}

function render(){
  // ─── CRTC 6845 RASTER EFFECTS ───
  updateRasterEffects();

  ctx.save();
  // Screen shake
  if(screenShake.intensity>0)ctx.translate(screenShake.x,screenShake.y);
  // Sync jitter
  ctx.translate(syncJitter,0);

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);

  const blink=Math.floor(performance.now()/500)%2===0;
  const LH=22;

  if(bootRunning&&bootLines.length>0){
    ctx.font=`18px ${MONO}`;ctx.fillStyle=FG;
    ctx.textAlign='left';ctx.textBaseline='top';
    glow(FG,8);
    bootLines.forEach((l,i)=>ctx.fillText(l,30,30+i*LH));
    if(blink){
      const last=bootLines[bootLines.length-1]||'';
      const cw=ctx.measureText(last).width;
      ctx.fillRect(30+cw+2,30+(bootLines.length-1)*LH+LH-5,11,3);
    }
    noGlow();return;
  }

  if(showTitle){
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font=`bold 56px ${MONO}`;ctx.fillStyle=FG;
    glow(FG,22);ctx.fillText('SHMUP',W/2,H/2-160);
    ctx.font=`20px ${MONO}`;
    ['┌────────────┐','│  IBM 5153  │','└────────────┘'].forEach((l,i)=>ctx.fillText(l,W/2,H/2-68+i*26));
    if(blink){ctx.font=`24px ${MONO}`;ctx.fillText('■ PRESS SPACE ■',W/2,H/2+40)}
    ctx.font=`14px ${MONO}`;ctx.fillStyle='rgba(51,255,51,0.5)';
    ctx.fillText('ARROWS/WASD ─ MOVE  │  SPACE ─ FIRE  │  P ─ PAUSE',W/2,H/2+120);
    noGlow();return;
  }

  if(gs==='playing'||gs==='paused'){
    // ─── SCROLLING BACKGROUND ───
    drawBackground();

    ctx.textAlign='center';ctx.textBaseline='middle';

    for(const p of parts){
      ctx.globalAlpha=p.l/p.ml;
      ctx.fillStyle=p.col;
      ctx.fillRect(p.x-2,p.y-2,4,4);
    }
    ctx.globalAlpha=1;

    ctx.font=`16px ${MONO}`;
    glow('#ff0',10);ctx.fillStyle='#ffdd00';
    for(const p of pups){if(!p.act)continue;Glyphs.powerup.forEach((l,i)=>ctx.fillText(l,p.x,p.y-16+i*16))}

    glow('#f00',6);ctx.fillStyle='#ff4444';
    for(const b of ebuls){if(!b.act)continue;ctx.fillRect(b.x-2,b.y-5,4,10)}

    glow(FG,8);ctx.fillStyle=FG;
    for(const b of buls){if(!b.act)continue;ctx.fillRect(b.x-2,b.y-5,4,10)}

    ctx.font=`18px ${MONO}`;
    for(const e of enems){
      if(!e.act)continue;
      const col=e.hp/e.mh>0.5?FG:'#ff6633';
      ctx.fillStyle=col;glow(col,8);
      e.g.forEach((l,i)=>ctx.fillText(l,e.x,e.y-e.g.length*9+i*18+9));
    }

    // Boss
    if(boss){
      ctx.font=`16px ${MONO}`;ctx.textAlign='center';
      const bossCol=boss.hp/boss.mh>0.3?FG:'#ff3300';
      ctx.fillStyle=bossCol;glow(bossCol,16);
      boss.g.forEach((l,i)=>ctx.fillText(l,boss.x,boss.y-boss.g.length*9+i*18+9));
      // HP bar
      ctx.fillStyle='#0a0';ctx.fillRect(boss.x-50,boss.y-40,100,6);
      ctx.fillStyle='#0f0';ctx.fillRect(boss.x-50,boss.y-40,100*(boss.hp/boss.mh),6);
    }

    if(pl&&!(pl.inv>0&&Math.floor(pl.inv/4)%2===0)){
      ctx.font=`20px ${MONO}`;ctx.fillStyle=FG;glow(FG,14);
      Glyphs.player.forEach((l,i)=>ctx.fillText(l,pl.x,pl.y-28+i*20));
    }

    noGlow();ctx.globalAlpha=1;

    ctx.font=`14px ${MONO}`;ctx.fillStyle=FG;glow(FG,5);
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText('SCORE '+String(score).padStart(5,'0'),120,8);
    ctx.fillText('HI '+String(hs).padStart(5,'0'),W-120,8);
    ctx.textAlign='left';ctx.textBaseline='bottom';
    let ls='';for(let i=0;i<lives;i++)ls+='▲ ';
    ctx.fillText(ls,120,H-8);
    ctx.textAlign='right';ctx.fillText('PWR:'+pl.pw,W-120,H-8);
    ctx.textAlign='center';ctx.fillStyle='rgba(51,255,51,0.4)';
    ctx.fillText('WAVE '+wave,W/2,H-8);
    if(cc>1){ctx.fillStyle='#ffdd00';ctx.font=`18px ${MONO}`;glow('#ff0',10);ctx.textBaseline='top';ctx.fillText('×'+cc,W/2,32)}
    if(gs==='paused'){
      ctx.fillStyle=FG;ctx.font=`30px ${MONO}`;ctx.textAlign='center';ctx.textBaseline='middle';
      glow(FG,18);ctx.fillText('PAUSED',W/2,H/2-20);
      ctx.font=`16px ${MONO}`;ctx.fillText('PRESS P TO CONTINUE',W/2,H/2+24);
    }
    noGlow();
  }

  if(gameOverShow){
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font=`36px ${MONO}`;ctx.fillStyle=FG;glow(FG,20);
    ctx.fillText('GAME OVER',W/2,H/2-60);
    ctx.font=`22px ${MONO}`;ctx.fillText('SCORE: '+score,W/2,H/2-10);
    if(blink){ctx.font=`20px ${MONO}`;ctx.fillText('■ PRESS SPACE ■',W/2,H/2+50)}
    noGlow();
  }

  // ─── RASTER TEAR (CRTC 6845 scanline offset) ───
  if(rasterTear.active){
    ctx.save();
    const tearY=200+Math.sin(frame*0.3)*60,tearH=40;
    ctx.beginPath();ctx.rect(0,tearY,W,tearH);ctx.clip();
    ctx.translate(rasterTear.offset*0.5,0);
    ctx.fillStyle='rgba(0,255,0,0.03)';ctx.fillRect(0,tearY,W,tearH);
    ctx.strokeStyle='rgba(0,255,0,0.15)';ctx.lineWidth=1;
    for(let sy=0;sy<tearH;sy+=4){const ss=Math.sin(sy*0.5+frame*0.2)*3;ctx.beginPath();ctx.moveTo(0,tearY+sy);ctx.lineTo(W,tearY+sy);ctx.stroke()}
    ctx.restore();
  }

  ctx.restore();
}

function loop(){up();render();requestAnimationFrame(loop)}

document.addEventListener('keydown',e=>{
  // Unlock audio on first keypress
  if(audioCtx.state==='suspended')audioCtx.resume();
  keys[e.code]=true;
  if(e.code==='KeyP'&&!e.repeat){if(gs==='playing')gs='paused';else if(gs==='paused')gs='playing'}
  if((e.code==='Space'||e.code==='Enter')&&!e.repeat){
    if(bootRunning){bootRunning=false;bootDone=true;showTitle=true;startMatrixRain();cancelled=true}
    else if((showTitle||gameOverShow)&&performance.now()-goTime>400)startGame()
  }
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault()
});
document.addEventListener('keyup',e=>{keys[e.code]=false});

boot();loop();
</script>
