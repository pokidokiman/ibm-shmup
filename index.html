<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>IBM SHMUP - INSERT COIN</title>
<style>
body,html{margin:0;padding:0;width:100%;height:100%;background:#020202;overflow:hidden;display:flex;justify-content:center;align-items:center}
#canvas-container{width:100vw;height:100vh;max-width:1024px;max-height:768px;aspect-ratio:4/3;box-shadow:0 0 100px rgba(0,0,0,0.8);position:relative}
canvas{width:100%;height:100%;display:block}
#boot-overlay{position:absolute;top:0;left:0;width:100%;height:100%;color:#33ff33;padding:40px 60px;font-size:14px;font-family:'Courier New',monospace;pointer-events:none;z-index:10;display:none;text-shadow:0 0 8px #33ff33}
#title-overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;justify-content:center;align-items:center;color:#0f0;text-shadow:0 0 12px #0f0;z-index:10;pointer-events:none}
#title-overlay h1{font-size:48px;letter-spacing:12px;margin-bottom:10px}
#title-overlay .box{font-family:'Courier New',monospace;font-size:16px;display:inline-block;padding:10px 30px;border:2px solid #0f0;box-shadow:0 0 8px rgba(0,255,0,0.15)}
#title-overlay .blink{font-size:22px;animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<div id="canvas-container">
  <div id="boot-overlay" style="display:none"></div>
  <div id="title-overlay" style="display:none;visibility:hidden">
  </div>
</div>
<script>
// ─── CANVAS SETUP ───
const textCanvas = document.createElement('canvas');
textCanvas.width = 1024; textCanvas.height = 768;
const ctx = textCanvas.getContext('2d');

// ─── AUDIO ───
const ac = new (window.AudioContext||window.webkitAudioContext)();
function blip(f,d,t='square',v=0.08){try{const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d)}catch(e){}}
function sfxShoot(){blip(800,0.08)}function sfxHit(){blip(200,0.15,'sawtooth',0.08)}function sfxExplode(){blip(100,0.3,'sawtooth',0.1);blip(60,0.4)}function sfxPowerup(){blip(600,0.1);setTimeout(()=>blip(900,0.15),100)}function sfxGameOver(){blip(300,0.2);setTimeout(()=>blip(200,0.2),200);setTimeout(()=>blip(100,0.4),400)}

// ─── GAME ───
const W=1024,H=768;
const Glyphs={player:[' ▲ ','╱ ╲','╲ ╱',' │ '],enemy1:['┌─┐','│O│','└─┘'],enemy2:['┌┴┐','├[┤','└┬┘'],enemy3:[' /\\ ','/OO\\','│  │'],powerup:[' ╔═╗ ',' ║P║ ',' ╚═╝ ']};
let gs='title',score=0,hs=parseInt(localStorage.getItem('hs'))||0,lives=3,wave=0,frame=0;
let keys={},pl,buls,enems,ebuls,pups,parts;
let wt=0,cc=0,ct=0;
function mkPl(){return{x:W/2,y:H-80,w:24,h:24,speed:5,fire:8,ft:0,pw:1,inv:0}}
function mkBul(x,y,en=false,sp=6){return{x,y,w:4,h:10,sp:en?sp:-sp,en,act:true}}
const eTypes=[
  {g:Glyphs.enemy1,hp:1,sp:1.2,sc:100,sr:90,w:18,h:18},
  {g:Glyphs.enemy2,hp:2,sp:1.5,sc:200,sr:70,w:18,h:18},
  {g:Glyphs.enemy3,hp:3,sp:0.9,sc:300,sr:120,w:20,h:18},
];
function mkEn(x,y,t,p){return{x,y,type:t,hp:t.hp,mh:t.hp,g:t.g,w:t.w,h:t.h,sp:t.sp,sc:t.sc,sr:t.sr,st:Math.random()*t.sr,pat:p||'down',act:true,ox:x,ti:0}}
function mkPup(x,y,ty='p'){return{x,y,w:30,h:18,ty,sp:2,act:true}}
function mkParts(x,y,c='#0f0',n=8){const p=[];for(let i=0;i<n;i++){const a=Math.PI*2/n*i;p.push({x,y,vx:Math.cos(a)*(1+Math.random()*3),vy:Math.sin(a)*(1+Math.random()*3),l:20+Math.random()*20,ml:40,c,})}return p}
function reset(){score=0;lives=3;wave=0;frame=0;cc=0;ct=0;pl=mkPl();buls=[];enems=[];ebuls=[];pups=[];parts=[];wt=60}

// ─── BOOT ───
const bootEl=document.getElementById('boot-overlay');
const titleEl=document.getElementById('title-overlay');
let br=false,bd=false,showTitle=false;
const bL=[
  {t:'',d:200},{t:'IBM 5153 BIOS v1.11 01/10/84',d:300},{t:'Copyright 1984 IBM Corp.',d:200},{t:'',d:150},
  {t:'  CPU: Intel 8088 @ 4.77 MHz',d:150},{t:'  Coprocessor: None',d:100},{t:'',d:100},
  {t:'Memory Test:     ',d:80,mem:true},{t:'',d:150},{t:'  IBM SHMUP v1.0 detected',d:400},{t:'',d:100},
  {t:'  2 Floppy drive(s) detected',d:300},{t:'',d:150},{t:'  Starting MS-DOS...',d:600},{t:'',d:200},
];
function boot(){
  br=true;bd=false;bootEl.style.display='none';titleEl.style.display='none';
  let li=0,ci=0,mem=0,bt='';
  function n(){
    if(li>=bL.length){bt+='\n\n$ INSERT COIN';bootEl.textContent=bt;br=false;bd=true;showTitle=true;return}
    const l=bL[li];
    if(l.mem){
      mem=0;(function mt(){
        mem+=Math.floor(8+Math.random()*24);
        if(mem>=640){mem=640;bt+=l.t+'0640 KB OK\n';bootEl.textContent=bt+'█';li++;setTimeout(n,200);return}
        const ml=l.t+String(mem).padStart(4,' ')+' KB',a=bt.split('\n');
        if(a.length>0&&a[a.length-1].startsWith(l.t.trim()))a[a.length-1]=ml;else a.push(ml);
        bt=a.join('\n');bootEl.textContent=bt+'█';setTimeout(mt,30)
      })();return
    }
    if(ci<l.t.length){bt+=l.t[ci];ci++;bootEl.textContent=bt+'█';setTimeout(n,20+Math.random()*20)}
    else{bt+='\n';ci=0;li++;bootEl.textContent=bt+'█';setTimeout(n,l.d)}
  }
  bt='';bootEl.textContent='█';setTimeout(n,100)
}
function start(){
  if(br)return;
  if(!bd){boot();bd=true;return}
  showTitle=false;
  reset();gs='playing';bootEl.style.display='none';
  if(ac.state==='suspended')ac.resume()
}

// ─── UPDATE ───
function up(){
  if(gs!=='playing')return;frame++;
  if(keys['ArrowLeft']||keys['KeyA']||keys['KeyQ'])pl.x-=pl.speed;
  if(keys['ArrowRight']||keys['KeyD'])pl.x+=pl.speed;
  if(keys['ArrowUp']||keys['KeyZ']||keys['KeyW'])pl.y-=pl.speed;
  if(keys['ArrowDown']||keys['KeyS'])pl.y+=pl.speed;
  pl.x=Math.max(20,Math.min(W-20,pl.x));pl.y=Math.max(20,Math.min(H-20,pl.y));
  if(pl.ft>0)pl.ft--;
  if((keys['Space']||keys['KeyZ'])&&pl.ft<=0){
    sfxShoot();const pw=pl.pw;
    if(pw>=1)buls.push(mkBul(pl.x,pl.y-12));
    if(pw>=2){buls.push(mkBul(pl.x-8,pl.y-6));buls.push(mkBul(pl.x+8,pl.y-6))}
    if(pw>=3){buls[buls.length-3].vx=-0.5;buls[buls.length-2].vx=0.5}
    pl.ft=pl.fire-pl.pw
  }
  if(pl.inv>0)pl.inv--;
  if(ct>0)ct--;else cc=0;
  wt--;
  if(wt<=0&&enems.length===0){
    wave++;const cols=7,rows=Math.min(2+Math.floor(wave/2),5),sx=100,sy=70,sx2=(W-(cols-1)*sx)/2,sy2=60,ti=Math.min(Math.floor(wave/2),eTypes.length-1);
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){if(Math.random()<0.1)continue;const et=r<2&&wave>2?eTypes[Math.min(ti+1,eTypes.length-1)]:eTypes[Math.max(ti-1,0)];enems.push(mkEn(sx2+c*sx,sy2+r*sy,et,'w'))}
    wt=120+wave*20;enems.forEach(e=>e.sp+=0.05*wave)
  }
  for(const b of buls){b.y+=b.sp;if(b.vx)b.x+=b.vx;if(b.y<-20||b.y>H+20)b.act=false}
  buls=buls.filter(b=>b.act);
  for(const b of ebuls){b.y+=b.sp;if(b.y>H+20)b.act=false}
  ebuls=ebuls.filter(b=>b.act);
  for(const e of enems){
    e.ti++;
    if(e.pat==='w'){e.x=e.ox+Math.sin(e.ti*0.02+e.y*0.01)*40;e.y+=e.sp*0.3}else e.y+=e.sp;
    e.st--;if(e.st<=0&&e.y>20&&e.y<H*0.6){ebuls.push(mkBul(e.x,e.y+10,true,2+Math.random()));e.st=Math.max(40,e.sr-wave*2)}
    if(e.y>H+30)e.act=false
  }
  for(const p of pups){p.y+=p.sp;if(p.y>H+20)p.act=false}
  pups=pups.filter(p=>p.act);
  for(const b of buls){if(!b.act)continue;for(const e of enems){if(!e.act)continue;if(Math.abs(b.x-e.x)<e.w/2+6&&Math.abs(b.y-e.y)<e.h/2+6){b.act=false;e.hp--;if(e.hp<=0){e.act=false;const pts=Math.floor(e.sc*(1+cc*0.1));score+=pts;cc++;ct=120;parts.push(...mkParts(e.x,e.y,'#0f0',12),...mkParts(e.x,e.y,'#ff0',6));sfxExplode();if(Math.random()<0.12)pups.push(mkPup(e.x,e.y))}else{sfxHit();parts.push(...mkParts(e.x,e.y,'#0f0',4))}break}}}
  if(pl.inv<=0){
    for(const b of ebuls){if(!b.act)continue;if(Math.abs(b.x-pl.x)<16&&Math.abs(b.y-pl.y)<16){b.act=false;hit();break}}
    if(pl.inv<=0)for(const e of enems){if(!e.act)continue;if(Math.abs(e.x-pl.x)<e.w/2+12&&Math.abs(e.y-pl.y)<e.h/2+12){e.act=false;parts.push(...mkParts(e.x,e.y,'#f00',16));sfxExplode();hit();break}}
  }
  for(const p of pups){if(!p.act)continue;if(Math.abs(p.x-pl.x)<28&&Math.abs(p.y-pl.y)<28){p.act=false;if(p.ty==='p'&&pl.pw<4)pl.pw++;sfxPowerup()}}
  pups=pups.filter(p=>p.act);
  for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.l--}
  parts=parts.filter(p=>p.l>0);enems=enems.filter(e=>e.act)
}
function hit(){lives--;pl.inv=120;pl.pw=Math.max(1,pl.pw-1);parts.push(...mkParts(pl.x,pl.y,'#f00',20));sfxGameOver();if(lives<=0){gs='gameover';if(score>hs){hs=score;localStorage.setItem('hs',hs)}}}

// ─── DRAW ───
function draw(){
  ctx.save();ctx.fillStyle='#020a02';ctx.fillRect(0,0,W,H);
  // Draw boot text to canvas if visible
  if(bootEl.textContent){
    ctx.fillStyle='#33ff33';ctx.shadowBlur=6;ctx.shadowColor='#33ff33';ctx.font='14px "Courier New", monospace';
    bootEl.textContent.split('\n').forEach((l,i)=>ctx.fillText(l.replace('█','_'),20,30+i*22));
    ctx.shadowBlur=0
  }
  // Draw title text to canvas if visible
  if(showTitle){
    ctx.fillStyle='#33ff33';ctx.shadowBlur=6;ctx.shadowColor='#33ff33';ctx.font='48px "Courier New", monospace';ctx.textAlign='center';
    ctx.fillText('SHMUP',W/2,200);
    ctx.font='18px "Courier New", monospace';ctx.fillText('IBM 5153',W/2,280);
    ctx.font='22px "Courier New", monospace';ctx.fillText('□ INSERT COIN □',W/2,380);
    ctx.shadowBlur=0
  }
  if(gs==='playing'||gs==='paused'||gs==='gameover'){
    ctx.shadowBlur=0;
    if(gs!=='gameover'&&pl.inv%6<3){
      ctx.fillStyle='#0f0';ctx.font='16px "Courier New", monospace';ctx.textAlign='center';
      Glyphs.player.forEach((l,i)=>ctx.fillText(l,pl.x,pl.y-14+i*14))
    }
    ctx.fillStyle='#0f0';for(const b of buls)ctx.fillRect(b.x-1,b.y-6,3,12);
    ctx.fillStyle='#ff0';for(const b of ebuls){ctx.fillRect(b.x-3,b.y-3,6,6);ctx.fillStyle='#0f0'}
    for(const e of enems){
      const c=e.hp<e.mh&&frame%4<2?'#ff0':'#0f0';ctx.fillStyle=c;ctx.font='16px "Courier New", monospace';ctx.textAlign='center';
      e.g.forEach((l,i)=>ctx.fillText(l,e.x,e.y-14+i*14));
      if(e.mh>1){ctx.fillStyle='#0a0';ctx.fillRect(e.x-10,e.y-16,20,3);ctx.fillStyle='#0f0';ctx.fillRect(e.x-10,e.y-16,20*(e.hp/e.mh),3)}
    }
    for(const p of pups){
      ctx.fillStyle='#0ff';ctx.font='16px "Courier New", monospace';ctx.textAlign='center';
      Glyphs.powerup.forEach((l,i)=>ctx.fillText(l,p.x,p.y-14+i*14))
    }
    for(const p of parts){
      ctx.globalAlpha=p.l/p.ml;ctx.fillStyle=p.c;ctx.font='14px monospace';ctx.textAlign='center';
      ctx.fillText(['*','+','.','°'][Math.floor(Math.random()*4)],p.x,p.y)
    }
    ctx.globalAlpha=1;
    ctx.fillStyle='#0f0';ctx.font='16px monospace';ctx.textAlign='left';let ls='';for(let i=0;i<lives;i++)ls+='▲ ';ctx.fillText(ls,20,H-20);
    ctx.textAlign='right';ctx.fillText('PWR:'+pl.pw,W-20,H-20);
    ctx.textAlign='center';ctx.font='14px monospace';ctx.fillStyle='rgba(0,255,0,0.4)';ctx.fillText('WAVE '+wave,W/2,H-20);
    if(cc>1){ctx.fillStyle='#ff0';ctx.textAlign='center';ctx.font='18px monospace';ctx.fillText('×'+cc,W/2,40)}
    if(gs==='paused'){ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#0f0';ctx.font='24px monospace';ctx.textAlign='center';ctx.fillText('PAUSED',W/2,H/2);ctx.font='14px';ctx.fillText('PRESS P TO CONTINUE',W/2,H/2+30)}
    // Score altijd tonen tijdens game
    ctx.fillStyle='#0f0';ctx.font='14px monospace';ctx.textAlign='left';ctx.fillText('SCORE '+String(score).padStart(5,'0'),20,30);
    ctx.textAlign='right';ctx.fillText('HI '+String(hs).padStart(5,'0'),W-20,30)
  }
  ctx.restore()
}

// ─── THREE.JS ───
const container=document.getElementById('canvas-container');
const scene=new THREE.Scene(),camera=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
const renderer=new THREE.WebGLRenderer({antialias:false});
renderer.setSize(container.clientWidth,container.clientHeight);
container.appendChild(renderer.domElement);
const texture=new THREE.CanvasTexture(textCanvas);texture.minFilter=THREE.LinearFilter;
const uniforms={tDiffuse:{value:texture},uTime:{value:0}};

const vs=`varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position,1.0);}`;
const fs=`uniform sampler2D tDiffuse;uniform float uTime;varying vec2 vUv;
  vec2 curve(vec2 uv){uv=(uv-0.5)*2.0;uv.x*=1.0+pow(abs(uv.y)/4.0,2.0);uv.y*=1.0+pow(abs(uv.x)/3.0,2.0);uv=uv/2.0+0.5;uv=uv*0.92+0.04;return uv;}
  void main(){vec2 uv=curve(vUv);if(uv.x<0.0||uv.x>1.0||uv.y<0.0||uv.y>1.0){gl_FragColor=vec4(0.0,0.0,0.0,1.0);return;}
  float r=texture2D(tDiffuse,uv+vec2(0.0015,0.0)).r;float g=texture2D(tDiffuse,uv).g;float b=texture2D(tDiffuse,uv-vec2(0.0015,0.0)).b;vec3 col=vec3(r,g,b);
  col-=sin(uv.y*800.0)*0.12;col*=1.0+0.01*sin(uTime*20.0);float v=uv.x*uv.y*(1.0-uv.x)*(1.0-uv.y);col*=clamp(pow(16.0*v,0.4),0.0,1.0);gl_FragColor=vec4(col,1.0);}`;

const mat=new THREE.ShaderMaterial({vertexShader:vs,fragmentShader:fs,uniforms});
scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),mat));

window.addEventListener('resize',()=>renderer.setSize(container.clientWidth,container.clientHeight));

// ─── GAME LOOP ───
function loop(){
  up();draw();texture.needsUpdate=true;uniforms.uTime.value=performance.now()/1000.0;
  renderer.render(scene,camera);
  requestAnimationFrame(loop)
}

// ─── KEYBOARD ───
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='KeyP'&&gs==='playing')gs='paused';
  else if(e.code==='KeyP'&&gs==='paused')gs='playing';
  if(e.code==='Space'||e.code==='Enter'){
    if(br){br=false;bd=true;showTitle=true;bootEl.style.display='none'}
    else if(gs==='title'||gs==='gameover')start()
  }
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault()
});
document.addEventListener('keyup',e=>{keys[e.code]=false});

// ─── START ───
boot();
loop();
</script>
</body>
</html>
