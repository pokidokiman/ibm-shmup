<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBM SHMUP - PRESS SPACE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#010401;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;font-family:'Courier New',Courier,monospace}

/* MONITOR BEHUIZING */
#monitor{
  position:relative;
  width:900px;height:675px;
  background:#050a05;
  border:22px solid #2a2a2a;
  border-radius:40px;
  box-shadow:
    0 30px 60px rgba(0,0,0,0.8),
    inset 0 0 100px rgba(0,0,0,0.6),
    inset 0 0 30px rgba(0,20,0,0.4);
  overflow:hidden;
}

/* SCHERM — hier komt alle content */
#screen{
  position:absolute;
  top:40px;left:40px;right:40px;bottom:40px;
  color:#33ff33;font-size:20px;line-height:1.4;
  text-shadow:0 0 1px rgba(51,255,51,0.9), 0 0 7px rgba(51,255,51,0.6), 0 0 15px rgba(51,255,51,0.3);
  filter:url(#crt-barrel);
  border-radius:10px;
  overflow:hidden;
}

/* SCANLINES */
#scanlines{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:linear-gradient(to bottom,rgba(0,0,0,0) 50%,rgba(0,0,0,0.18) 50%);
  background-size:100% 3px;
  pointer-events:none;z-index:10;
}

/* VIGNETTE — phosphor edge darkening */
#vignette{
  position:absolute;top:40px;left:40px;right:40px;bottom:40px;
  background:radial-gradient(ellipse at 50% 50%,
    transparent 45%,
    rgba(0,0,0,0.30) 68%,
    rgba(0,0,0,0.72) 88%,
    rgba(0,0,0,0.90) 100%
  );
  pointer-events:none;z-index:11;
  border-radius:10px;
}

/* SCREEN GLASS REFLECTION */
#glass{
  position:absolute;top:40px;left:40px;right:40px;bottom:40px;
  background:linear-gradient(
    145deg,
    rgba(255,255,255,0.035) 0%,
    transparent 45%,
    transparent 55%,
    rgba(255,255,255,0.012) 100%
  );
  pointer-events:none;z-index:12;
  border-radius:10px;
}

/* FOSFOR DECAY */
@keyframes pd{0%{opacity:1;text-shadow:0 0 10px rgba(51,255,51,1)}100%{opacity:0.85;text-shadow:0 0 2px rgba(51,255,51,0.6)}}
.d{animation:pd 0.8s ease-out}

/* CURSOR */
@keyframes blink{50%{opacity:0}}
.c{display:inline-block;width:14px;height:3px;background:#33ff33;box-shadow:0 0 10px #33ff33;margin-left:2px;vertical-align:text-bottom;animation:blink 1s step-end infinite}

/* HIDDEN CANVAS voor game render */
#game-canvas{display:none}
</style>
</head>
<body>
<div id="monitor">
  <div id="scanlines"></div>
  <div id="screen"></div>
  <div id="vignette"></div>
  <div id="glass"></div>
</div>

<canvas id="game-canvas" width="1024" height="768"></canvas>

<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <filter id="crt-barrel" filterUnits="objectBoundingBox" x="-10%" y="-10%" width="120%" height="120%">
      <feImage id="sphereMap" result="map" href=""/>
      <feDisplacementMap in="SourceGraphic" in2="map" scale="80" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<script>
// ─── GENERATE BARREL DISTORTION MAP ───
// Produces a mathematically correct barrel-warp displacement map at runtime.
// Red channel = horizontal displacement, Green = vertical (128 = neutral).
(function(){
  const MW=256,MH=256,k=0.38;
  const c=document.createElement('canvas');
  c.width=MW;c.height=MH;
  const cx=c.getContext('2d');
  const id=cx.createImageData(MW,MH);
  const d=id.data;
  for(let y=0;y<MH;y++){
    for(let x=0;x<MW;x++){
      const nx=(x/MW)*2-1, ny=(y/MH)*2-1;
      const r2=nx*nx+ny*ny;
      // Barrel: source pixels radially displaced outward from center
      const dx=nx*k*r2, dy=ny*k*r2;
      const i=(y*MW+x)*4;
      d[i  ]=Math.max(0,Math.min(255,Math.round((dx+1)*127.5)));
      d[i+1]=Math.max(0,Math.min(255,Math.round((dy+1)*127.5)));
      d[i+2]=128;
      d[i+3]=255;
    }
  }
  cx.putImageData(id,0,0);
  document.getElementById('sphereMap').setAttribute('href',c.toDataURL());
})();

// ─── CANVAS SETUP ───
const canvas=document.getElementById('game-canvas');
const ctx=canvas.getContext('2d');
const W=1024,H=768;

// ─── SCREEN DIV ───
const screenDiv=document.getElementById('screen');

// ─── GAME STATE ───
const Glyphs={player:[' ▲ ','╱ ╲','╲ ╱',' │ '],enemy1:['┌─┐','│O│','└─┘'],enemy2:['┌┴┐','├[┤','└┬┘'],enemy3:[' /\\ ','/OO\\','│  │'],powerup:[' ╔═╗ ',' ║P║ ',' ╚═╝ ']};
let gs='title',score=0,hs=parseInt(localStorage.getItem('hs'))||0,lives=3,wave=0,frame=0;
let keys={},pl,buls,enems,ebuls,pups,parts;
let wt=0,cc=0,ct=0;

function mkPl(){return{x:W/2,y:H-80,w:24,h:24,speed:5,fire:8,ft:0,pw:1,inv:0}}
function mkBul(x,y,en=false,sp=6){return{x,y,w:4,h:10,sp:en?sp:-sp,en,act:true}}
const eTypes=[
  {g:Glyphs.enemy1,hp:1,sp:1.2,sc:100,sr:90,w:18,h:18},
  {g:Glyphs.enemy2,hp:2,sp:1.5,sc:200,sr:70,w:18,h:18},
  {g:Glyphs.enemy3,hp:3,sp:0.9,sc:300,sr:120,w:20,h:18},
];
function mkEn(x,y,t,p){return{x,y,type:t,hp:t.hp,mh:t.hp,g:t.g,w:t.w,h:t.h,sp:t.sp,sc:t.sc,sr:t.sr,st:Math.random()*t.sr,pat:p||'d',act:true,ox:x,ti:0}}
function mkPup(x,y,ty='p'){return{x,y,w:30,h:18,ty,sp:2,act:true}}
function mkParts(x,y,c='#0f0',n=8){const p=[];for(let i=0;i<n;i++){const a=Math.PI*2/n*i;p.push({x,y,vx:Math.cos(a)*(1+Math.random()*3),vy:Math.sin(a)*(1+Math.random()*3),l:20+Math.random()*20,ml:40,c})}return p}
function reset(){score=0;lives=3;wave=0;frame=0;cc=0;ct=0;pl=mkPl();buls=[];enems=[];ebuls=[];pups=[];parts=[];wt=60}

// ─── BOOT ───
const bL=[
  {t:'',d:200},{t:'IBM 5153 BIOS v1.11 01/10/84',d:300},{t:'Copyright 1984 IBM Corp.',d:200},{t:'',d:150},
  {t:'  CPU: Intel 8088 @ 4.77 MHz',d:150},{t:'  Coprocessor: None',d:100},{t:'',d:100},
  {t:'Memory Test:     ',d:80,mem:true},{t:'',d:150},{t:'  IBM SHMUP v1.0 detected',d:400},{t:'',d:100},
  {t:'  2 Floppy drive(s) detected',d:300},{t:'',d:150},{t:'  Starting MS-DOS...',d:600},{t:'',d:200},
];
let bootLines=[],showTitle=false,bootRunning=true,bootDone=false,gameOverShow=false;

function boot(){
  bootRunning=true;bootDone=false;showTitle=false;gameOverShow=false;
  let li=0,ci=0,mem=0,bt=[];
  function n(){
    if(li>=bL.length){
      bt.push('');bt.push('$ PRESS SPACE');
      bootLines=bt;bootRunning=false;bootDone=true;showTitle=true;renderScreen();
      return;
    }
    const l=bL[li];
    if(l.mem){
      mem=0;(function mt(){
        mem+=Math.floor(8+Math.random()*24);
        if(mem>=640){mem=640;bt.push(l.t+'0640 KB OK');li++;setTimeout(n,200);return}
        const ml=l.t+String(mem).padStart(4,' ')+' KB';
        if(bt.length>0&&bt[bt.length-1].startsWith(l.t.trim()))bt[bt.length-1]=ml;else bt.push(ml);
        bootLines=[...bt];renderScreen();setTimeout(mt,30)
      })();return
    }
    if(ci<l.t.length){
      if(bt.length===0||bt[bt.length-1].endsWith('\n')||li===0)bt.push('');
      bt[bt.length-1]+=l.t[ci];ci++;
      bootLines=[...bt];renderScreen();setTimeout(n,20+Math.random()*20);
    }else{
      bt.push('');ci=0;li++;
      bootLines=[...bt];renderScreen();setTimeout(n,l.d)
    }
  }
  bootLines=[];setTimeout(n,100)
}

function startGame(){
  if(bootRunning)return;
  showTitle=false;gameOverShow=false;
  reset();gs='playing';renderScreen()
}

// ─── UPDATE ───
function up(){
  if(gs!=='playing')return;frame++;
  if(keys['ArrowLeft']||keys['KeyA']||keys['KeyQ'])pl.x-=pl.speed;
  if(keys['ArrowRight']||keys['KeyD'])pl.x+=pl.speed;
  if(keys['ArrowUp']||keys['KeyW'])pl.y-=pl.speed;
  if(keys['ArrowDown']||keys['KeyS'])pl.y+=pl.speed;
  pl.x=Math.max(20,Math.min(W-20,pl.x));pl.y=Math.max(20,Math.min(H-20,pl.y));
  if(pl.ft>0)pl.ft--;
  // Space fires; Z on AZERTY moves up AND fires (intentional AZERTY dual-role)
  if((keys['Space']||keys['KeyZ'])&&pl.ft<=0){
    if(pl.pw>=1)buls.push(mkBul(pl.x,pl.y-12));
    if(pl.pw>=2){buls.push(mkBul(pl.x-8,pl.y-6));buls.push(mkBul(pl.x+8,pl.y-6))}
    // Fix: apply outward spread to the two side bullets (indices -2 and -1)
    if(pl.pw>=3){buls[buls.length-2].vx=-0.5;buls[buls.length-1].vx=0.5}
    pl.ft=pl.fire-pl.pw
  }
  if(pl.inv>0)pl.inv--;
  if(ct>0)ct--;else cc=0;
  wt--;
  if(wt<=0&&enems.length===0){
    wave++;const cols=7,rows=Math.min(2+Math.floor(wave/2),5),sx=100,sy=70,sx2=(W-(cols-1)*sx)/2,sy2=60,ti=Math.min(Math.floor(wave/2),eTypes.length-1);
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){if(Math.random()<0.1)continue;const et=r<2&&wave>2?eTypes[Math.min(ti+1,eTypes.length-1)]:eTypes[Math.max(ti-1,0)];enems.push(mkEn(sx2+c*sx,sy2+r*sy,et,'w'))}
    wt=120+wave*20;enems.forEach(e=>e.sp+=0.05*wave)
  }
  for(const b of buls){b.y+=b.sp;if(b.vx)b.x+=b.vx;if(b.y<-20||b.y>H+20)b.act=false}
  buls=buls.filter(b=>b.act);
  for(const b of ebuls){b.y+=b.sp;if(b.y>H+20)b.act=false}
  ebuls=ebuls.filter(b=>b.act);
  for(const e of enems){
    e.ti++;
    if(e.pat==='w'){e.x=e.ox+Math.sin(e.ti*0.02+e.y*0.01)*40;e.y+=e.sp*0.3}else e.y+=e.sp;
    e.st--;if(e.st<=0&&e.y>20&&e.y<H*0.6){ebuls.push(mkBul(e.x,e.y+10,true,2+Math.random()));e.st=Math.max(40,e.sr-wave*2)}
    if(e.y>H+30)e.act=false
  }
  for(const p of pups){p.y+=p.sp;if(p.y>H+20)p.act=false}
  pups=pups.filter(p=>p.act);
  for(const b of buls){if(!b.act)continue;for(const e of enems){if(!e.act)continue;if(Math.abs(b.x-e.x)<e.w/2+6&&Math.abs(b.y-e.y)<e.h/2+6){b.act=false;e.hp--;if(e.hp<=0){e.act=false;const pts=Math.floor(e.sc*(1+cc*0.1));score+=pts;cc++;ct=120;parts.push(...mkParts(e.x,e.y,'#0f0',12),...mkParts(e.x,e.y,'#ff0',6));if(Math.random()<0.12)pups.push(mkPup(e.x,e.y))}else{parts.push(...mkParts(e.x,e.y,'#0f0',4))}break}}}
  if(pl.inv<=0){
    for(const b of ebuls){if(!b.act)continue;if(Math.abs(b.x-pl.x)<16&&Math.abs(b.y-pl.y)<16){b.act=false;hit();break}}
    if(pl.inv<=0)for(const e of enems){if(!e.act)continue;if(Math.abs(e.x-pl.x)<e.w/2+12&&Math.abs(e.y-pl.y)<e.h/2+12){e.act=false;parts.push(...mkParts(e.x,e.y,'#f00',16));hit();break}}
  }
  for(const p of pups){if(!p.act)continue;if(Math.abs(p.x-pl.x)<28&&Math.abs(p.y-pl.y)<28){p.act=false;if(p.ty==='p'&&pl.pw<4)pl.pw++}}
  pups=pups.filter(p=>p.act);
  for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.l--}
  parts=parts.filter(p=>p.l>0);enems=enems.filter(e=>e.act)
}
function hit(){lives--;pl.inv=120;pl.pw=Math.max(1,pl.pw-1);parts.push(...mkParts(pl.x,pl.y,'#f00',20));if(lives<=0){gs='gameover';if(score>hs){hs=score;localStorage.setItem('hs',hs)}gameOverShow=true}}

// ─── RENDER ───
function renderScreen(){
  let html='';

  if(bootRunning&&bootLines.length>0){
    html+='<p class="d">'+bootLines.join('<br>')+'<span class="c"></span></p>'
  }

  if(showTitle){
    html+='<p style="font-size:42px;text-align:center;margin-top:80px;letter-spacing:8px">SHMUP</p>';
    html+='<p style="font-size:18px;text-align:center;margin-top:15px">┌────────────┐<br>│ IBM 5153 │<br>└────────────┘</p>';
    html+='<p style="font-size:22px;text-align:center;margin-top:60px">';
    if(Math.floor(performance.now()/500)%2===0)html+='■ PRESS SPACE ■';
    else html+='  PRESS SPACE  ';
    html+='</p>';
    html+='<p style="font-size:14px;text-align:center;margin-top:50px;opacity:0.5">ARROWS/WASD/ZQSD ─ MOVE &nbsp;│&nbsp; SPACE ─ FIRE<br>Z ─ MOVE UP (AZERTY) &nbsp;│&nbsp; P ─ PAUSE</p>'
  }

  if(gs==='playing'||gs==='paused'){
    html+='<p style="font-size:14px;position:absolute;top:5px;left:10px">SCORE '+String(score).padStart(5,'0')+'</p>';
    html+='<p style="font-size:14px;position:absolute;top:5px;right:10px">HI '+String(hs).padStart(5,'0')+'</p>';
    let ls='';for(let i=0;i<lives;i++)ls+='▲ ';
    html+='<p style="font-size:16px;position:absolute;bottom:5px;left:10px">'+ls+'</p>';
    html+='<p style="font-size:14px;position:absolute;bottom:5px;right:10px">PWR:'+pl.pw+'</p>';
    html+='<p style="font-size:12px;position:absolute;bottom:5px;left:50%;transform:translateX(-50%);opacity:0.4">WAVE '+wave+'</p>';
    if(cc>1)html+='<p style="font-size:18px;text-align:center;margin-top:10px;color:#ff0">×'+cc+'</p>';
    if(gs==='paused')html+='<p style="font-size:22px;text-align:center;margin-top:200px">PAUSED</p><p style="font-size:14px;text-align:center">PRESS P TO CONTINUE</p>'
  }

  if(gameOverShow){
    html+='<p style="font-size:28px;text-align:center;margin-top:200px;letter-spacing:6px">GAME OVER</p>';
    html+='<p style="font-size:18px;text-align:center;margin-top:20px">SCORE: '+score+'</p>';
    html+='<p style="font-size:16px;text-align:center;margin-top:40px">';
    if(Math.floor(performance.now()/500)%2===0)html+='■ PRESS SPACE ■';
    else html+='  PRESS SPACE  ';
    html+='</p>'
  }

  screenDiv.innerHTML=html
}

// ─── GAME LOOP ───
function loop(){
  up();renderScreen();
  requestAnimationFrame(loop)
}

// ─── KEYBOARD ───
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='KeyP'&&gs==='playing')gs='paused';
  else if(e.code==='KeyP'&&gs==='paused')gs='playing';
  if(e.code==='Space'||e.code==='Enter'){
    if(bootRunning){bootRunning=false;bootDone=true;showTitle=true;renderScreen()}
    else if(showTitle||gameOverShow)startGame()
  }
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault()
});
document.addEventListener('keyup',e=>{keys[e.code]=false});

// ─── START ───
boot();loop();
</script>
</body>
</html>
